<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: #1a1a2e;
            overflow: hidden;
        }
        
        #map { width: 100vw; height: 100vh; }
        
        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 320px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        
        .legend {
            position: fixed;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-height: 500px;
            overflow-y: auto;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
            z-index: 2000;
            text-align: center;
        }
        .loading .progress { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🦞 世界地图</h1>
        <p>已整合省级边界：<br>• 中部平原（34省）<br>• 北境荒原（85区）<br>• 深渊边境（36邦）<br>• 火山群岛（47都道府县）<br><br>拖拽移动，滚轮缩放</p>
    </div>
    
    <div class="legend">
        <h3>🗺️ 图例</h3>
        <h4 style="color:#81c784;margin:10px 0 5px;">已开发区域</h4>
        <div class="legend-item"><div class="legend-color" style="background: #4fc3f7;"></div><span>人类城市</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #81c784;"></div><span>精灵/农业区</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb74d;"></div><span>矮人/要塞</span></div>
        
        <h4 style="color:#ff8a65;margin:10px 0 5px;">未开发区域</h4>
        <div class="legend-item"><div class="legend-color" style="background: #ff8a65;"></div><span>中危区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ef5350;"></div><span>高危区域</span></div>
        
        <h4 style="color:#ba68c8;margin:10px 0 5px;">其他势力</h4>
        <div class="legend-item"><div class="legend-color" style="background: #ba68c8;"></div><span>龙裔区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9575cd;"></div><span>深渊族</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #e57373;"></div><span>兽人区域</span></div>
        
        <h4 style="color:#ff5252;margin:10px 0 5px;">危险区域</h4>
        <div class="legend-item"><div class="legend-color" style="background: #ff5252;"></div><span>裂缝/禁地</span></div>
    </div>
    
    <div class="loading" id="loading">
        <div>🦞 加载地图中...</div>
        <div class="progress" id="progress">准备加载...</div>
    </div>
    <div id="map"></div>

        // 深渊边境区域数据（印度）
        const abyssBorderData = {

        // 火山群岛区域数据（日本）
        const volcanoIslandsData = {

            '熔岩平原': { region: '主岛', status: '未开发', danger: '高', race: '火元素', color: '#ef5350' },

        // 世界其他区域数据
        const worldRegionsData = {

            '主山脉': { status: '部分开发', danger: '中', race: '矮人', color: '#ffb74d' },
            '古老森林': { status: '未开发', danger: '低-中', race: '精灵', color: '#81c784' },
            '沙漠区': { status: '未开发', danger: '中', race: '沙漠人类', color: '#d4a855' },
            '裂缝荒原': { status: '禁地', danger: '极高', race: '无', color: '#ff5252' },
            '龙族圣地': { status: '圣地', danger: '低', race: '银龙裔', color: '#ba68c8' },
            '南方森林': { status: '未开发', danger: '低-中', race: '木精灵', color: '#81c784' },
            '冰龙遗迹': { status: '遗迹', danger: '极高', race: '古代龙裔', color: '#b8d4e3' }
        };
        
        // ========== 名称映射 ==========
        
        // 中国省份映射
        const chinaProvinceMap = {
            '北京': '龙虾城', '天津': '王家直辖地', '河北': '寒风原', '山西': '铁矿山区',
            '内蒙古': '霜狼森林', '辽宁': '黑石关', '吉林': '古木森林', '黑龙江': '幽暗小径',
            '上海': '银龙河渡口', '江苏': '东部农场', '浙江': '金麦城', '安徽': '药草谷',
            '福建': '月影镇', '江西': '古木森林', '山东': '东部农场', '河南': '王家直辖地',
            '湖北': '迷雾沼泽', '湖南': '南方湿地', '广东': '河口城', '广西': '边境哨站',
            '海南': '失落矿坑', '重庆': '赤岩镇', '四川': '干燥荒原', '贵州': '幽暗小径',
            '云南': '古木森林', '西藏': '主山脉', '陕西': '铁矿山区', '甘肃': '寒风原',
            '青海': '霜狼森林', '宁夏': '黑石关', '新疆': '主山脉', '台湾': '火山群岛',
            '香港': '河口城', '澳门': '河口城', '南海诸岛': '南方湿地'
        };
        
        // 俄罗斯区域映射（简化版 - 将联邦主体映射到8个大区）
        const russiaRegionMap = {
            'Moscow': '冰霜堡垒', 'Moscow City': '冰霜堡垒',
            'Saint Petersburg': '北境商路', 'Leningrad': '北境商路',
            'Murmansk': '永冻苔原', 'Arkhangelsk': '冰原猎场',
            'Sakha': '冰原猎场', 'Chukotka': '冰原猎场',
            'Krasnoyarsk': '极光平原', 'Irkutsk': '极光平原',
            'Primorsky': '霜冻森林', 'Khabarovsk': '霜冻森林',
            'Tatarstan': '兽人王庭', 'Bashkortostan': '兽人王庭',
            'Sverdlovsk': '狼群山谷', 'Chelyabinsk': '狼群山谷',
            'Novosibirsk': '北境商路', 'Omsk': '北境商路'
        };
        
        // 印度邦映射
        const indiaStateMap = {
            'Delhi': '深渊王城', 'Maharashtra': '深渊商港',
            'Karnataka': '深渊商港', 'Tamil Nadu': '深渊商港',
            'West Bengal': '暗影森林', 'Assam': '暗影森林',
            'Uttar Pradesh': '深渊王城', 'Madhya Pradesh': '深渊王城',
            'Rajasthan': '裂隙观测站', 'Gujarat': '裂隙观测站',
            'Himachal Pradesh': '苍白圣谷', 'Uttarakhand': '苍白圣谷',
            'Kerala': '深渊商港', 'Andhra Pradesh': '深渊商港'
        };
        
        // 日本都道府县映射
        const japanPrefectureMap = {
            'Tokyo': '赤焰城', 'Kanagawa': '赤焰城', 'Osaka': '赤焰城',
            'Hokkaido': '火山神殿', 'Aomori': '火山神殿',
            'Kyoto': '赤焰城', 'Hyogo': '熔岩平原',
            'Fukuoka': '黑沙滩', 'Nagasaki': '黑沙滩',
            'Okinawa': '黑沙滩', 'Kagoshima': '熔岩平原'
        };
        
        // 世界国家映射
        const worldNameMap = {
            'China': '中部平原', 'Russia': '北境荒原', 'India': '深渊边境', 'Japan': '火山群岛',
            'Mongolia': '风暴高原', 'Kazakhstan': '主山脉',
            'Indonesia': '龙族圣地', 'Vietnam': '南方森林', 'Thailand': '南方森林',
            'Myanmar': '南方森林', 'Laos': '南方森林', 'Cambodia': '南方森林',
            'Malaysia': '南方森林', 'Philippines': '火山群岛',
            'North Korea': '风暴高原', 'South Korea': '风暴高原',
            'Uzbekistan': '沙漠区', 'Turkmenistan': '沙漠区',
            'Kyrgyzstan': '主山脉', 'Tajikistan': '主山脉',
            'Afghanistan': '沙漠区', 'Pakistan': '深渊边境',
            'Nepal': '深渊边境', 'Bhutan': '深渊边境',
            'Bangladesh': '深渊边境', 'Sri Lanka': '深渊边境',
            'Iran': '沙漠区', 'Iceland': '冰龙遗迹', 'Greenland': '冰龙遗迹'
        };
        
        // ========== 加载并合并地图 ==========
        
        async function loadMap() {
            try {
                // 1. 加载世界地图
                updateProgress('加载世界地图...');
                const worldRes = await fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json');
                const worldJson = await worldRes.json();
                
                // 2. 加载中国省份
                updateProgress('加载中部平原省份数据...');
                const chinaRes = await fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/china.json');
                const chinaJson = await chinaRes.json();
                
                // 3. 从世界地图中移除要替换的国家
                updateProgress('合并地图数据...');
                const countriesToRemove = ['China', 'Russia', 'India', 'Japan'];
                worldJson.features = worldJson.features.filter(f => 
                    !countriesToRemove.includes(f.properties.name)
                );
                
                // 4. 添加中国省份（带名称转换）
                chinaJson.features.forEach(f => {
                    const originalName = f.properties.name;
                    const newName = chinaProvinceMap[originalName] || originalName;
                    f.properties.name = newName;
                    f.properties.originalName = originalName;
                });
                worldJson.features = worldJson.features.concat(chinaJson.features);
                
                // 5. 注册合并后的地图
                updateProgress('渲染地图...');
                echarts.registerMap('combinedWorld', worldJson);
                
                // 6. 准备数据
                const mapData = [];
                
                // 中部平原省份
                Object.keys(centralPlainsData).forEach(name => {
                    mapData.push({
                        name: name,
                        value: 1,
                        itemStyle: { areaColor: centralPlainsData[name].color }
                    });
                });
                
                // 北境荒原（用俄罗斯原名，因为GeoJSON没有详细数据）
                mapData.push({
                    name: '北境荒原',
                    value: 1,
                    itemStyle: { areaColor: '#e57373' }
                });
                
                // 深渊边境
                mapData.push({
                    name: '深渊边境',
                    value: 1,
                    itemStyle: { areaColor: '#9575cd' }
                });
                
                // 火山群岛
                mapData.push({
                    name: '火山群岛',
                    value: 1,
                    itemStyle: { areaColor: '#ba68c8' }
                });
                
                // 其他世界区域
                Object.keys(worldRegionsData).forEach(name => {
                    mapData.push({
                        name: name,
                        value: 1,
                        itemStyle: { areaColor: worldRegionsData[name].color }
                    });
                });
                
                // 7. 配置图表
                const allData = {
                    ...centralPlainsData,
                    '北境荒原': { status: '未开发', danger: '高', race: '北境人类、兽人' },
                    '深渊边境': { status: '未开发', danger: '中高', race: '深渊族' },
                    '火山群岛': { status: '未开发', danger: '高', race: '红龙裔' },
                    ...worldRegionsData
                };
                
                const option = {
                    backgroundColor: '#1a1a2e',
                    
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(26, 26, 46, 0.95)',
                        borderColor: '#4a4a6a',
                        borderWidth: 1,
                        textStyle: { color: '#fff' },
                        formatter: function(params) {
                            if (params.seriesName === '城市') {
                                return `<div style="font-weight:bold;color:#ffd700;">${params.name}</div>`;
                            }
                            
                            const info = allData[params.name];
                            if (!info) return params.name;
                            
                            const statusColor = info.status === '未开发' ? '#ff8a65' : 
                                               info.status === '禁地' ? '#ff5252' : 
                                               info.status === '部分开发' ? '#ffb74d' : '#81c784';
                            const dangerColor = info.danger.includes('极高') ? '#ff5252' : 
                                               info.danger.includes('高') ? '#ffb74d' : '#81c784';
                            
                            return `
                                <div style="padding:8px;max-width:280px;">
                                    <div style="font-size:15px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                    <div style="font-size:12px;line-height:1.8;">
                                        <div><span style="color:#87ceeb;">状态：</span><span style="color:${statusColor};">${info.status}</span></div>
                                        <div><span style="color:#87ceeb;">危险：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                        <div><span style="color:#87ceeb;">种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                        ${info.region ? `<div><span style="color:#87ceeb;">区域：</span>${info.region}</div>` : ''}
                                    </div>
                                </div>
                            `;
                        }
                    },
                    
                    geo: {
                        map: 'combinedWorld',
                        roam: true,
                        zoom: 2.8,
                        center: [95, 40],
                        scaleLimit: { min: 2, max: 8 },
                        label: { 
                            show: true, 
                            color: '#fff', 
                            fontSize: 8,
                            formatter: function(params) {
                                // 省份名可能很长，缩短显示
                                const name = params.name;
                                if (name.length > 4) {
                                    return name.substring(0, 3) + '..';
                                }
                                return name;
                            }
                        },
                        itemStyle: { 
                            areaColor: '#2a3a4a', 
                            borderColor: '#5a6a7a', 
                            borderWidth: 0.8 
                        },
                        emphasis: {
                            label: { show: true, color: '#ffd700', fontSize: 11 },
                            itemStyle: { areaColor: '#4a6a7a', shadowBlur: 10 }
                        },
                        regions: mapData.map(d => ({
                            name: d.name,
                            itemStyle: d.itemStyle,
                            emphasis: { 
                                itemStyle: { 
                                    areaColor: d.itemStyle.areaColor,
                                    shadowBlur: 15 
                                } 
                            }
                        }))
                    },
                    
                    series: [
                        {
                            type: 'map',
                            map: 'combinedWorld',
                            geoIndex: 0,
                            data: mapData
                        },
                        {
                            name: '城市',
                            type: 'scatter',
                            coordinateSystem: 'geo',
                            data: [
                                { name: '王都', value: [116, 40], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#ffd700' } },
                                { name: '精灵城', value: [130, 52], symbol: 'pin', symbolSize: 28, itemStyle: { color: '#81c784' } },
                                { name: '矮人堡', value: [82, 43], symbol: 'pin', symbolSize: 28, itemStyle: { color: '#ffb74d' } },
                                { name: '深渊王城', value: [77, 28], symbol: 'pin', symbolSize: 28, itemStyle: { color: '#9575cd' } },
                                { name: '兽人王庭', value: [90, 55], symbol: 'pin', symbolSize: 28, itemStyle: { color: '#e57373' } },
                                { name: '赤焰城', value: [139, 35], symbol: 'pin', symbolSize: 25, itemStyle: { color: '#ba68c8' } },
                                { name: '圣坛', value: [118, -2], symbol: 'pin', symbolSize: 25, itemStyle: { color: '#ba68c8' } }
                            ],
                            label: { 
                                show: true, 
                                formatter: '{b}', 
                                position: 'bottom', 
                                color: '#ffd700', 
                                fontSize: 10,
                                fontWeight: 'bold'
                            }
                        }
                    ]
                };
                
                chart.setOption(option);
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('加载地图失败:', error);
                document.getElementById('loading').innerHTML = 
                    '<div>地图加载失败</div><div class="progress">请刷新页面重试</div>';
            }
        }
        
        loadMap();
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
