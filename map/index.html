        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-width: 320px;
        }
        .panel h1 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .panel p { font-size: 12px; color: #aaa; line-height: 1.5; }
        .panel .status { margin-top: 10px; font-size: 11px; color: #81c784; }
        .panel .stats { 
            margin-top: 10px; 
            font-size: 10px; 
            color: #87ceeb; 
            border-top: 1px solid #4a4a6a; 
            padding-top: 8px;
            line-height: 1.8;
        }
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 11px;
        }
        .legend h3 { color: #ffd700; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; margin: 2px 0; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
    </style>
</head>

        async function loadGeoJSON(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) {
                console.log(`Failed: ${url}`);
                return null;
            }
        }
        
        async function init() {
            const regionCount = {};
            
            try {
                setStatus('加载世界地图...');
                const world = await loadGeoJSON('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json');
                if (!world) throw new Error('World map failed');
                
                setStatus('加载中部平原...');
                const china = await loadGeoJSON('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
                
                setStatus('加载火山群岛...');
                const japan = await loadGeoJSON('https://cdn.jsdelivr.net/npm/japan-prefecture-geojson@1.0.0/json/japan.json');
                
                setStatus('加载深渊边境...');
                const india = await loadGeoJSON('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json');
                
                setStatus('加载龙族圣地...');
                const indonesia = await loadGeoJSON('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json');
                
                setStatus('加载南方森林...');
                const vietnam = await loadGeoJSON('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json');
                
                setStatus('加载主山脉...');
                const kazakhstan = await loadGeoJSON('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json');
                
                setStatus('合并地图数据...');
                
                // 要移除的国家（替换为详细省份的）
                const removeCountries = ['China', 'Japan'];
                let features = world.features.filter(f => !removeCountries.includes(f.properties.name));
                
                // 确保俄罗斯和蒙古保留并正确命名
                const russiaFeature = world.features.find(f => f.properties.name === 'Russia');
                const mongoliaFeature = world.features.find(f => f.properties.name === 'Mongolia');
                if (russiaFeature) features.push(russiaFeature);
                if (mongoliaFeature) features.push(mongoliaFeature);
                
                // 添加中国省份
                let count = 0;
                if (china && china.features) {
                    china.features.forEach(f => {
                        if (f.properties && f.properties.name) {
                            features.push({
                                type: 'Feature',
                                properties: { name: f.properties.name },
                                geometry: f.geometry
                            });
                            count++;
                        }
                    });
                }
                regionCount['中部平原'] = count;
                
                // 添加日本都道府县
                count = 0;
                if (japan && japan.features) {
                    japan.features.forEach(f => {
                        const name = f.properties?.name_ja || f.properties?.name;
                        if (name) {
                            features.push({
                                type: 'Feature',
                                properties: { name: name },
                                geometry: f.geometry
                            });
                            count++;
                        }
                    });
                }
                regionCount['火山群岛'] = count;
                
                // 其他区域保持整体显示
                regionCount['深渊边境'] = 36;
                regionCount['龙族圣地'] = 34;
                regionCount['南方森林'] = 140;
                regionCount['北境荒原'] = 85;
                regionCount['风暴高原'] = 21;
                regionCount['主山脉'] = 20;
                regionCount['沙漠区'] = 4;
                
                echarts.registerMap('combined', { type: 'FeatureCollection', features });
                
                setStatus('渲染地图...');
                
                // 准备数据
                const data = [];
                const allInfo = {};
                
                // 中国
                Object.keys(chinaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: chinaData[name].color } });
                    allInfo[name] = chinaData[name].name;
                });
                
                // 日本
                Object.keys(japanData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: japanData[name].color } });
                    allInfo[name] = japanData[name].name;
                });
                
                // 印度
                Object.keys(indiaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: indiaData[name].color } });
                    allInfo[name] = indiaData[name].name;
                });
                
                // 印度尼西亚
                Object.keys(indonesiaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: indonesiaData[name].color } });
                    allInfo[name] = indonesiaData[name].name;
                });
                
                // 越南
                Object.keys(vietnamData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: vietnamData[name].color } });
                    allInfo[name] = vietnamData[name].name;
                });
                
                // 泰国
                Object.keys(thailandData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: thailandData[name].color } });
                    allInfo[name] = thailandData[name].name;
                });
                
                // 哈萨克斯坦
                Object.keys(kazakhstanData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: kazakhstanData[name].color } });
                    allInfo[name] = kazakhstanData[name].name;
                });
                
                // 其他
                Object.keys(otherData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: otherData[name].color } });
                    allInfo[name] = otherData[name].name;
                });
                
                chart.setOption({
                    backgroundColor: '#1a3a5c',
                    tooltip: {
                        formatter: p => {
                            const name = allInfo[p.name] || p.name;
                            return `<b style="color:#ffd700">${name}</b>`;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'combined',
                        roam: true,
                        zoom: 2.3,
                        center: [100, 28],
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 5,
                            formatter: p => {
                                const name = allInfo[p.name] || p.name;
                                return name.length > 3 ? name.slice(0, 2) + '..' : name;
                            }
                        },
                        itemStyle: {
                            areaColor: '#3d5a4a',
                            borderColor: '#7ab8a8',
                            borderWidth: 1
                        },
                        emphasis: {
                            label: { color: '#ffd700', fontSize: 9 },
                            itemStyle: { borderColor: '#ffd700', borderWidth: 2 }
                        },
                        data: data
                    }]
                });
                
                setStatus('✓ 加载完成');
                setStats(regionCount);
                
            } catch (e) {
                console.error('加载失败:', e);
                setStatus('✗ 加载失败，请刷新');
            }
        }
        
        init();
        window.onresize = () => chart.resize();
