        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif;

            overflow: hidden;
        }
        
        #map {
            width: 100vw;
            height: 100vh;
        }
        
        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        
        .breadcrumb {
            margin-top: 10px;
            font-size: 12px;
            color: #87ceeb;
        }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb span:hover { color: #ffd700; }
        
        .legend {
            position: fixed;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-height: 450px;
            overflow-y: auto;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
        
        .back-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 10px 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            cursor: pointer;
            display: none;
        }
        .back-btn:hover { background: #3a3a5a; }
        .back-btn.show { display: block; }
    </style>

        // 加载世界地图
        function loadWorldMap() {
            currentLevel = 'world';
            currentRegion = null;
            document.getElementById('mapTitle').textContent = '🦞 世界地图';
            document.getElementById('backBtn').classList.remove('show');
            document.getElementById('breadcrumb').innerHTML = '<span onclick="goToWorld()">世界</span>';
            
            if (!worldGeoJson) {
                fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json')
                    .then(response => response.json())
                    .then(json => {
                        worldGeoJson = json;
                        renderWorldMap();
                    });
            } else {
                renderWorldMap();
            }
        }
        
        function renderWorldMap() {
            echarts.registerMap('world', worldGeoJson);
            
            const data = Object.keys(worldData).map(name => ({
                name: name,
                value: worldData[name].danger === '极高' ? 100 : 
                       worldData[name].danger.includes('高') ? 70 : 
                       worldData[name].danger.includes('中') ? 50 : 30,
                itemStyle: { areaColor: worldData[name].color }
            }));
            
            const option = {
                backgroundColor: '#1a1a2e',
                
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 46, 0.95)',
                    borderColor: '#4a4a6a',
                    borderWidth: 1,
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        if (params.componentType === 'series' && params.seriesType === 'scatter') {
                            return `<div style="font-weight:bold;color:#ffd700;">${params.name}</div>`;
                        }
                        const info = worldData[params.name];
                        if (!info) return params.name;
                        
                        const statusColor = info.status === '未开发' ? '#ff8a65' : 
                                           info.status === '禁地' ? '#ff5252' : '#81c784';
                        const dangerColor = info.danger.includes('极高') ? '#ff5252' : 
                                           info.danger.includes('高') ? '#ffb74d' : '#81c784';
                        
                        return `
                            <div style="padding:5px;max-width:300px;">
                                <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                <div style="font-size:12px;line-height:1.8;">
                                    <div><span style="color:#87ceeb;">开发状态：</span><span style="color:${statusColor};">${info.status}</span></div>
                                    <div><span style="color:#87ceeb;">危险等级：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                    <div><span style="color:#87ceeb;">主要种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                    <div><span style="color:#87ceeb;">描述：</span>${info.description}</div>
                                    <div style="margin-top:8px;color:#aaa;font-style:italic;">点击进入详细地图</div>
                                </div>
                            </div>
                        `;
                    }
                },
                
                geo: {
                    map: 'world',
                    roam: true,
                    zoom: 3,
                    center: [100, 35],
                    scaleLimit: { min: 2, max: 10 },
                    label: { show: true, color: '#fff', fontSize: 10 },
                    nameMap: worldNameMap,
                    itemStyle: { areaColor: '#2a3a4a', borderColor: '#4a5a6a', borderWidth: 1 },
                    emphasis: {
                        label: { show: true, color: '#ffd700', fontSize: 14 },
                        itemStyle: { areaColor: '#4a6a7a' }
                    },
                    regions: Object.keys(worldData).map(name => ({
                        name: name,
                        itemStyle: { areaColor: worldData[name].color, borderColor: '#fff', borderWidth: 1 },
                        emphasis: { itemStyle: { areaColor: worldData[name].color, shadowBlur: 20 } }
                    }))
                },
                
                series: [{
                    type: 'map',
                    map: 'world',
                    geoIndex: 0,
                    data: data,
                    nameMap: worldNameMap
                }, {
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: [
                        { name: '王都', value: [116, 40], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#ffd700' } }
                    ],
                    label: { show: true, formatter: '{b}', position: 'bottom', color: '#ffd700', fontSize: 11 }
                }]
            };
            
            chart.setOption(option, true);
            
            // 点击事件
            chart.off('click');
            chart.on('click', function(params) {
                if (params.componentType === 'geo' || params.componentType === 'series') {
                    const name = params.name;
                    if (name === '中部平原') {
                        loadCentralPlainsMap();
                    }
                }
            });
        }
        
        // 加载中部平原详细地图
        function loadCentralPlainsMap() {
            currentLevel = 'region';
            currentRegion = '中部平原';
            document.getElementById('mapTitle').textContent = '🦞 中部平原 - 详细地图';
            document.getElementById('backBtn').classList.add('show');
            document.getElementById('breadcrumb').innerHTML = '<span onclick="goToWorld()">世界</span> > <span>中部平原</span>';
            
            if (!chinaGeoJson) {
                fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/china.json')
                    .then(response => response.json())
                    .then(json => {
                        chinaGeoJson = json;
                        renderCentralPlainsMap();
                    });
            } else {
                renderCentralPlainsMap();
            }
        }
        
        function renderCentralPlainsMap() {
            echarts.registerMap('china', chinaGeoJson);
            
            const data = Object.keys(centralPlainsProvinces).map(name => ({
                name: name,
                value: centralPlainsProvinces[name].danger.includes('高') ? 80 : 
                       centralPlainsProvinces[name].danger.includes('中') ? 50 : 20,
                itemStyle: { areaColor: centralPlainsProvinces[name].color }
            }));
            
            const option = {
                backgroundColor: '#1a1a2e',
                
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 46, 0.95)',
                    borderColor: '#4a4a6a',
                    borderWidth: 1,
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        if (params.componentType === 'series' && params.seriesType === 'scatter') {
                            return `<div style="font-weight:bold;color:#ffd700;">${params.name}</div>`;
                        }
                        const info = centralPlainsProvinces[params.name];
                        if (!info) return params.name;
                        
                        const statusColor = info.status === '未开发' ? '#ff8a65' : 
                                           info.status === '部分开发' ? '#ffb74d' : '#81c784';
                        const dangerColor = info.danger.includes('高') ? '#ff5252' : 
                                           info.danger.includes('中') ? '#ffb74d' : '#81c784';
                        
                        return `
                            <div style="padding:5px;max-width:300px;">
                                <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                <div style="font-size:12px;line-height:1.8;">
                                    <div><span style="color:#87ceeb;">所属区域：</span>${info.region}</div>
                                    <div><span style="color:#87cebel;">开发状态：</span><span style="color:${statusColor};">${info.status}</span></div>
                                    <div><span style="color:#87ceeb;">危险等级：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                    <div><span style="color:#87ceeb;">人口：</span>${info.population}</div>
                                    <div><span style="color:#87ceeb;">主要种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                    <div><span style="color:#87ceeb;">描述：</span>${info.description}</div>
                                    <div><span style="color:#87ceeb;">特点：</span>${info.features}</div>
                                </div>
                            </div>
                        `;
                    }
                },
                
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    center: [105, 35],
                    scaleLimit: { min: 1, max: 6 },
                    label: { show: true, color: '#fff', fontSize: 9,
                        formatter: function(params) {
                            return provinceMap[params.name] || params.name;
                        }
                    },
                    nameMap: provinceMap,
                    itemStyle: { areaColor: '#2a3a4a', borderColor: '#4a5a6a', borderWidth: 1 },
                    emphasis: {
                        label: { show: true, color: '#ffd700', fontSize: 12 },
                        itemStyle: { areaColor: '#4a6a7a' }
                    },
                    regions: Object.keys(centralPlainsProvinces).map(name => ({
                        name: name,
                        itemStyle: { areaColor: centralPlainsProvinces[name].color, borderColor: '#fff', borderWidth: 1 },
                        emphasis: { itemStyle: { areaColor: centralPlainsProvinces[name].color, shadowBlur: 20 } }
                    }))
                },
                
                series: [{
                    type: 'map',
                    map: 'china',
                    geoIndex: 0,
                    data: data,
                    nameMap: provinceMap
                }, {
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: [
                        { name: '王都', value: [116, 40], symbol: 'pin', symbolSize: 45, itemStyle: { color: '#ffd700' } }
                    ],
                    label: { show: true, formatter: '{b}', position: 'bottom', color: '#ffd700', fontSize: 13, fontWeight: 'bold' }
                }]
            };
            
            chart.setOption(option, true);
        }
        
        // 返回上一层
        function goBack() {
            if (currentLevel === 'region') {
                loadWorldMap();
            }
        }
        
        function goToWorld() {
            loadWorldMap();
        }
        
        // 初始化
        loadWorldMap();
        
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
