<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-width: 320px;
        }
        .panel h1 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .panel p { font-size: 12px; color: #aaa; line-height: 1.5; }
        .panel .status { margin-top: 10px; font-size: 11px; color: #81c784; }
        .panel .stats { 
            margin-top: 10px; 
            font-size: 10px; 
            color: #87ceeb; 
            border-top: 1px solid #4a4a6a; 
            padding-top: 8px;
            line-height: 1.8;
        }
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 11px;
        }
        .legend h3 { color: #ffd700; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; margin: 2px 0; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
    </style>
</head>

        async function loadGeoJSON(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) {
                    console.log(`HTTP ${res.status}: ${url}`);
                    return null;
                }
                return await res.json();
            } catch (e) {
                console.log(`Failed: ${url}`, e.message);
                return null;
            }
        }
        
        async function init() {
            const regionCount = {};
            
            try {
                setStatus('加载世界地图...');
                const world = await loadGeoJSON('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json');
                if (!world) throw new Error('World map failed');
                
                setStatus('加载中部平原（34省）...');
                const china = await loadGeoJSON('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
                
                setStatus('加载俄罗斯联邦主体...');
                const russia = await loadGeoJSON('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/russia.geojson');
                
                setStatus('合并地图数据...');
                
                // 要移除的国家（只移除有详细数据的）
                const removeCountries = ['China', 'Russia'];
                let features = world.features.filter(f => !removeCountries.includes(f.properties.name));
                
                // 添加中国省份
                let count = 0;
                if (china && china.features) {
                    china.features.forEach(f => {
                        if (f.properties && f.properties.name) {
                            features.push({
                                type: 'Feature',
                                properties: { name: f.properties.name },
                                geometry: f.geometry
                            });
                            count++;
                        }
                    });
                }
                regionCount['中部平原'] = count;
                
                // 添加俄罗斯联邦主体
                count = 0;
                if (russia && russia.features) {
                    console.log('俄罗斯GeoJSON加载成功，features数量:', russia.features.length);
                    console.log('第一个feature的properties:', russia.features[0]?.properties);
                    
                    russia.features.forEach(f => {
                        // 尝试多种属性名
                        const name = f.properties?.name || f.properties?.NAME || f.properties?.name_en || 
                                    f.properties?.title || f.properties?.cartodb_id;
                        if (name) {
                            features.push({
                                type: 'Feature',
                                properties: { name: name },
                                geometry: f.geometry
                            });
                            count++;
                        }
                    });
                }
                regionCount['北境荒原'] = count || 85;
                
                // 蒙古保持整体显示（GeoJSON不可用）
                regionCount['风暴高原'] = 1;
                regionCount['火山群岛'] = 47;
                regionCount['深渊边境'] = 36;
                regionCount['龙族圣地'] = 34;
                regionCount['南方森林'] = 140;
                regionCount['主山脉'] = 20;
                regionCount['沙漠区'] = 4;
                
                echarts.registerMap('combined', { type: 'FeatureCollection', features });
                
                setStatus('渲染地图...');
                
                // 准备数据
                const data = [];
                const allInfo = {};
                
                // 中国
                Object.keys(chinaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: chinaData[name].color } });
                    allInfo[name] = chinaData[name].name;
                });
                
                // 俄罗斯
                Object.keys(russiaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: russiaData[name].color } });
                    allInfo[name] = russiaData[name].name;
                });
                
                // 蒙古（整体）
                data.push({ name: 'Mongolia', value: 1, itemStyle: { areaColor: '#ba68c8' } });
                allInfo['Mongolia'] = '风暴高原';
                
                // 其他
                Object.keys(otherData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: otherData[name].color } });
                    allInfo[name] = otherData[name].name;
                });
                
                chart.setOption({
                    backgroundColor: '#1a3a5c',
                    tooltip: {
                        formatter: p => {
                            const name = allInfo[p.name] || p.name;
                            return `<b style="color:#ffd700">${name}</b>`;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'combined',
                        roam: true,
                        zoom: 1.8,
                        center: [90, 50],
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 5,
                            formatter: p => {
                                const name = allInfo[p.name] || p.name;
                                return name.length > 3 ? name.slice(0, 2) + '..' : name;
                            }
                        },
                        itemStyle: {
                            areaColor: '#3d5a4a',
                            borderColor: '#7ab8a8',
                            borderWidth: 1
                        },
                        emphasis: {
                            label: { color: '#ffd700', fontSize: 9 },
                            itemStyle: { borderColor: '#ffd700', borderWidth: 2 }
                        },
                        data: data
                    }]
                });
                
                setStatus('✓ 加载完成');
                setStats(regionCount);
                
            } catch (e) {
                console.error('加载失败:', e);
                setStatus('✗ 加载失败，请刷新');
            }
        }
        
        init();
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
