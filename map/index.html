<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; }
        
        #map {
            width: 100vw;
            height: 100vh;
        }
        
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 280px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-height: 400px;
            overflow-y: auto;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
        
        .ol-popup {
            position: absolute;
            background: rgba(26, 26, 46, 0.98);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            bottom: 12px;
            left: -160px;
        }
        .ol-popup:after, .ol-popup:before {
            top: 100%;
            border: solid transparent;
            content: " ";
            height: 0;
            width: 0;
            position: absolute;
            pointer-events: none;
        }
        .ol-popup:after {
            border-top-color: rgba(26, 26, 46, 0.98);
            border-width: 10px;
            left: 50%;
            margin-left: -10px;
        }
        .popup-title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        .popup-info { font-size: 13px; line-height: 1.8; }
        .popup-info p { margin: 4px 0; }
        .popup-info strong { color: #87ceeb; }
        .popup-info .race { color: #90ee90; }
        .popup-info .danger-high { color: #ff6b6b; }
        .popup-info .danger-medium { color: #ffb74d; }
        .popup-info .danger-low { color: #81c784; }
        .popup-info ul { margin: 5px 0 5px 20px; }
        .popup-close {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .popup-close:hover { color: #fff; }
        
        .ol-control button {
            background: rgba(26, 26, 46, 0.95) !important;
            color: #fff !important;
            border: 1px solid #4a4a6a !important;
        }
        .ol-control button:hover {
            background: #3a3a5a !important;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🦞 龙虾系统 - 世界地图</h1>
        <p>点击区域查看信息<br>拖拽移动，滚轮缩放</p>
    </div>
    
    <div class="legend">
        <h3>🗺️ 图例</h3>
        <div class="legend-item"><div class="legend-color" style="background: #4fc3f7;"></div><span>人类区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #81c784;"></div><span>精灵/森林</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb74d;"></div><span>矮人/山脉</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #e57373;"></div><span>兽人/荒原</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ba68c8;"></div><span>龙裔区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9575cd;"></div><span>深渊族</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ff5252;"></div><span>裂缝危险区</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #4a90d9;"></div><span>河流</span></div>
    </div>
    
    <div id="popup" class="ol-popup">
        <button class="popup-close" onclick="closePopup()">×</button>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-info" id="popup-info"></div>
    </div>
    
    <div id="map"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>

        // SVG地图内容

            <text x="390" y="175" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">北境荒原</text>
            
            <!-- 2. 风暴高原 -->
            <path d="M800,95 L980,110 L1050,200 L1000,280 L880,250 L820,180 Z" 
                  fill="#6a8a9a" stroke="#8aaaaa" stroke-width="2" class="region" data-id="storm"/>
            <text x="920" y="185" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">风暴高原</text>
            
            <!-- 3. 主山脉 -->
            <path d="M220,220 L380,200 L480,230 L520,320 L440,380 L340,350 L260,290 Z" 
                  fill="#8a7a6a" stroke="#aa9a8a" stroke-width="2" class="region" data-id="mountain"/>
            <text x="370" y="290" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🏔️ 主山脉</text>
            
            <!-- 4. 森林区 -->
            <path d="M540,200 L720,190 L850,230 L870,340 L760,400 L640,370 L560,310 Z" 
                  fill="#4a7a4a" stroke="#6a9a6a" stroke-width="2" class="region" data-id="forest"/>
            <text x="700" y="295" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🌲 古老森林</text>
            
            <!-- 5. 中部平原 -->
            <path d="M240,360 L440,380 L550,420 L580,540 L480,600 L350,570 L260,480 Z" 
                  fill="#8aaa6a" stroke="#aaca8a" stroke-width="2" class="region" data-id="plains"/>
            <text x="410" y="480" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🏰 中部平原</text>
            
            <!-- 6. 火山群岛（东侧海外） -->
            <ellipse cx="1100" cy="380" rx="70" ry="55" fill="#aa5a3a" stroke="#ca7a5a" stroke-width="2" class="region" data-id="volcano"/>

            <!-- 7. 沙漠区 -->
            <path d="M280,580 L480,560 L580,610 L620,720 L500,780 L360,750 L280,660 Z"

                  fill="#4a3a3a" stroke="#6a5a5a" stroke-width="2" class="region" data-id="rift"/>

            <!-- 裂缝标记 -->

                <line x1="560" y1="820" x2="580" y2="870"/>
                <line x1="610" y1="840" x2="630" y2="890"/>

            <!-- 10. 龙族圣地 -->

                  fill="#c0c0c0" stroke="#e0e0e0" stroke-width="2" class="region" data-id="sanctuary"/>
            <text x="880" y="970" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">⛩️ 龙族圣地</text>
            
            <!-- 11. 南方森林 -->
            <path d="M620,980 L760,960 L820,1030 L790,1100 L680,1120 L600,1070 Z" 
                  fill="#3a6a3a" stroke="#5a8a5a" stroke-width="2" class="region" data-id="southForest"/>
            <text x="700" y="1040" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🌳 南方森林</text>
            
            <!-- 南极冰盖 -->
            <ellipse cx="650" cy="1150" rx="280" ry="45" fill="#d8e8f0" opacity="0.9"/>
            <text x="650" y="1155" text-anchor="middle" fill="#555" font-size="12">❄️ 南极冰盖</text>
            
            <!-- 河流 -->
            <!-- 银龙河 -->
            <path d="M420,320 Q470,410 520,490 Q580,560 680,600 Q780,640 880,660" 
                  stroke="#4a90d9" stroke-width="10" fill="none" opacity="0.5"/>
            <text x="580" y="450" fill="#4a90d9" font-size="10" transform="rotate(-25,580,450)">银龙河 →</text>
            
            <!-- 深渊河 -->

                  stroke="#4a90d9" stroke-width="8" fill="none" opacity="0.5"/>
            <text x="520" y="590" fill="#4a90d9" font-size="10" transform="rotate(85,520,590)">深渊河 ↓</text>
            
            <!-- 北境河 -->
            <path d="M920,160 Q880,120 840,100" 
                  stroke="#4a90d9" stroke-width="6" fill="none" opacity="0.5"/>
            
            <!-- 裂隙河 -->
            <path d="M880,970 Q920,1000 960,1020 Q1000,1050 1050,1070" 
                  stroke="#4a90d9" stroke-width="6" fill="none" opacity="0.5"/>
            
            <!-- 城市标记 -->
            <circle cx="410" cy="480" r="12" fill="#ffd700" stroke="#fff" stroke-width="3" class="marker" data-id="capital"/>

            <circle cx="700" cy="295" r="10" fill="#81c784" stroke="#fff" stroke-width="2" class="marker" data-id="elfCity"/>

            <circle cx="370" cy="290" r="10" fill="#ffb74d" stroke="#fff" stroke-width="2" class="marker" data-id="dwarfFort"/>

            <circle cx="880" cy="970" r="10" fill="#ffd700" stroke="#fff" stroke-width="2" class="marker" data-id="altar"/>
        </svg>`;
        
        // 创建SVG图层
        const svgLayer = new ol.layer.Image({
            source: new ol.source.ImageStatic({
                url: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgContent))),
                imageExtent: [0, 0, 1400, 1000],
                imageSize: [1400, 1000]
            })
        });
        
        // 创建地图
        const map = new ol.Map({
            target: 'map',
            layers: [svgLayer],
            view: new ol.View({
                projection: new ol.proj.Projection({
                    code: 'xkcd-image',
                    units: 'pixels',
                    extent: [0, 0, 1400, 1000]
                }),
                center: [700, 500],
                zoom: 1,
                minZoom: 0.5,
                maxZoom: 4,
                extent: [-200, -200, 1600, 1200]
            }),
            controls: ol.control.defaults.defaults().extend([
                new ol.control.ScaleLine()
            ])
        });
        
        // 弹窗覆盖层
        const popup = new ol.Overlay({
            element: document.getElementById('popup'),
            autoPan: {
                animation: {
                    duration: 250
                }
            }
        });
        map.addOverlay(popup);
        
        // 关闭弹窗
        function closePopup() {
            popup.setPosition(undefined);
        }
        
        // 显示弹窗
        function showPopup(id, coordinate) {
            const data = locationData[id];
            if (!data) return;
            
            const title = document.getElementById('popup-title');
            const info = document.getElementById('popup-info');
            
            const dangerClass = data.danger.includes("极高") ? "danger-high" : 
                               data.danger.includes("高") || data.danger.includes("中高") ? "danger-medium" : "danger-low";
            
            title.textContent = data.name;
            info.innerHTML = `
                <p><strong>主要种族：</strong><span class="race">${data.race}</span></p>
                <p><strong>危险等级：</strong><span class="${dangerClass}">${data.danger}</span></p>
                <p><strong>描述：</strong>${data.description}</p>
                <p><strong>特点：</strong></p>
                <ul>${data.features.map(f => `<li>${f}</li>`).join('')}</ul>
            `;
            
            popup.setPosition(coordinate);
        }
        
        // 点击事件
        map.on('click', function(evt) {
            const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                return feature;
            });
            
            if (feature) {
                const id = feature.get('id');
                showPopup(id, evt.coordinate);
            } else {
                closePopup();
            }
        });
        
        // 添加可点击区域
        const regions = [
            { id: 'iceDragon', coords: [[490, 55], [510, 55], [510, 35], [490, 35]] },
            { id: 'north', coords: [[200, 110], [560, 110], [580, 220], [480, 260], [350, 240], [240, 200]] },
            { id: 'storm', coords: [[800, 95], [1050, 200], [1000, 280], [880, 250], [820, 180]] },
            { id: 'mountain', coords: [[220, 220], [520, 320], [440, 380], [340, 350], [260, 290]] },
            { id: 'forest', coords: [[540, 200], [870, 340], [760, 400], [640, 370], [560, 310]] },
            { id: 'plains', coords: [[240, 360], [580, 540], [480, 600], [350, 570], [260, 480]] },
            { id: 'volcano', coords: [[1030, 380], [1100, 325], [1170, 380], [1100, 435]] },
            { id: 'desert', coords: [[280, 580], [620, 720], [500, 780], [360, 750], [280, 660]] },
            { id: 'abyss', coords: [[880, 360], [1050, 520], [1000, 620], [900, 580], [850, 470]] },
            { id: 'rift', coords: [[420, 780], [760, 920], [640, 980], [480, 950], [400, 870]] },
            { id: 'sanctuary', coords: [[760, 920], [1020, 950], [1000, 1020], [880, 1050], [780, 990]] },
            { id: 'southForest', coords: [[620, 980], [820, 1030], [790, 1100], [680, 1120], [600, 1070]] },
            { id: 'capital', coords: [[400, 470], [420, 470], [420, 490], [400, 490]] },
            { id: 'elfCity', coords: [[690, 285], [710, 285], [710, 305], [690, 305]] },
            { id: 'dwarfFort', coords: [[360, 280], [380, 280], [380, 300], [360, 300]] },
            { id: 'altar', coords: [[870, 960], [890, 960], [890, 980], [870, 980]] }
        ];
        
        const vectorSource = new ol.source.Vector();
        
        regions.forEach(r => {
            const polygon = new ol.geom.Polygon([r.coords.map(c => [c[0], 1000 - c[1]])]);
            const feature = new ol.Feature({
                geometry: polygon,
                id: r.id
            });
            vectorSource.addFeature(feature);
        });
        
        const vectorLayer = new ol.layer.Vector({
            source: vectorSource,
            style: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(0, 0, 0, 0)' }),
                stroke: new ol.style.Stroke({ color: 'rgba(0, 0, 0, 0)' })
            })
        });
        map.addLayer(vectorLayer);
        
        // 鼠标样式
        map.on('pointermove', function(e) {
            const feature = map.forEachFeatureAtPixel(e.pixel, function(feature) {
                return feature;
            });
            map.getTargetElement().style.cursor = feature ? 'pointer' : '';
        });
    </script>
</body>
</html>
