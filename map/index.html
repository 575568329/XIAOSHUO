                .then(chinaJson => {
                    echarts.registerMap('china', chinaJson);
                    
                    const data = Object.keys(centralPlainsData).map(name => ({
                        name: name,
                        value: centralPlainsData[name].value,
                        itemStyle: {
                            areaColor: centralColors[name] || '#3d5a4a'
                        }
                    }));
                    
                    const option = {
                        backgroundColor: '#1a1a2e',
                        
                        tooltip: {
                            trigger: 'item',
                            backgroundColor: 'rgba(26, 26, 46, 0.95)',
                            borderColor: '#4a4a6a',
                            borderWidth: 1,
                            textStyle: { color: '#fff' },
                            formatter: function(params) {
                                const info = centralPlainsData[params.name];
                                if (!info) return params.name;
                                
                                const statusColor = info.status === '未开发' ? '#ff5252' : 
                                                   info.status === '部分开发' ? '#ffb74d' : '#81c784';
                                const dangerColor = info.danger.includes('高') ? '#ff6b6b' : 
                                                   info.danger.includes('中') ? '#ffb74d' : '#81c784';
                                
                                return `
                                    <div style="padding:5px;max-width:280px;">
                                        <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                        <div style="font-size:12px;line-height:1.8;">
                                            <div><span style="color:#87ceeb;">所属区域：</span>${info.region}</div>
                                            <div><span style="color:#87ceeb;">开发状态：</span><span style="color:${statusColor};">${info.status}</span></div>
                                            <div><span style="color:#87ceeb;">危险等级：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                            <div><span style="color:#87ceeb;">人口：</span>${info.population}</div>
                                            <div><span style="color:#87ceeb;">主要种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                            <div><span style="color:#87ceeb;">描述：</span>${info.description}</div>
                                            <div><span style="color:#87ceeb;">特点：</span>${info.features}</div>
                                        </div>
                                    </div>
                                `;
                            }
                        },
                        
                        geo: {
                            map: 'china',
                            roam: true,
                            zoom: 1.2,
                            center: [105, 35],
                            scaleLimit: { min: 1, max: 5 },
                            label: {
                                show: true,
                                color: '#fff',
                                fontSize: 10,
                                formatter: function(params) {
                                    return centralNameMap[params.name] || params.name;
                                }
                            },
                            nameMap: centralNameMap,
                            itemStyle: {
                                areaColor: '#2a3a4a',
                                borderColor: '#4a5a6a',
                                borderWidth: 1
                            },
                            emphasis: {
                                label: {
                                    show: true,
                                    color: '#ffd700',
                                    fontSize: 14
                                },
                                itemStyle: {
                                    areaColor: '#4a6a7a'
                                }
                            },
                            regions: Object.keys(centralPlainsData).map(name => ({
                                name: name,
                                itemStyle: {
                                    areaColor: centralColors[name],
                                    borderColor: '#fff',
                                    borderWidth: 1
                                },
                                emphasis: {
                                    itemStyle: {
                                        areaColor: centralColors[name],
                                        shadowBlur: 20,
                                        shadowColor: 'rgba(0, 0, 0, 0.5)'
                                    }
                                }
                            }))
                        },
                        
                        series: [{
                            type: 'map',
                            map: 'china',
                            geoIndex: 0,
                            data: data,
                            nameMap: centralNameMap
                        }, {
                            type: 'scatter',
                            coordinateSystem: 'geo',
                            data: [
                                { name: '王都', value: [116, 40, 100], symbol: 'pin', symbolSize: 50, itemStyle: { color: '#ffd700' } }
                            ],
                            label: {
                                show: true,
                                formatter: '{b}',
                                position: 'bottom',
                                color: '#ffd700',
                                fontSize: 14,
                                fontWeight: 'bold'
                            }
                        }]
                    };
                    
                    chart.setOption(option, true);
                });
        }
        
        // 加载大世界地图
        function loadWorldMap() {
            currentMap = 'world';
            document.querySelector('.switch-btn').textContent = '切换到中部平原';
            document.querySelector('.info-panel h1').textContent = '🦞 世界地图';
            
            fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json')
                .then(response => response.json())
                .then(worldJson => {
                    echarts.registerMap('world', worldJson);
                    
                    const data = Object.keys(worldData).map(name => ({
                        name: name,
                        value: worldData[name].value,
                        itemStyle: {
                            areaColor: worldColors[name] || '#3d5a4a'
                        }
                    }));
                    
                    const option = {
                        backgroundColor: '#1a1a2e',
                        
                        tooltip: {
                            trigger: 'item',
                            backgroundColor: 'rgba(26, 26, 46, 0.95)',
                            borderColor: '#4a4a6a',
                            borderWidth: 1,
                            textStyle: { color: '#fff' },
                            formatter: function(params) {
                                const info = worldData[params.name];
                                if (!info) return params.name;
                                
                                const dangerColor = info.danger.includes('极高') ? '#ff6b6b' : 
                                                   info.danger.includes('高') ? '#ffb74d' : '#81c784';
                                
                                return `
                                    <div style="padding:5px;">
                                        <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                        <div style="font-size:13px;line-height:1.8;">
                                            <div><span style="color:#87ceeb;">主要种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                            <div><span style="color:#87ceeb;">危险等级：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                            <div><span style="color:#87ceeb;">描述：</span>${info.description}</div>
                                            <div><span style="color:#87ceeb;">特点：</span>${info.features}</div>
                                        </div>
                                    </div>
                                `;
                            }
                        },
                        
                        geo: {
                            map: 'world',
                            roam: true,
                            zoom: 3,
                            center: [105, 35],
                            scaleLimit: { min: 2, max: 10 },
                            label: {
                                show: true,
                                color: '#fff',
                                fontSize: 10
                            },
                            nameMap: worldNameMap,
                            itemStyle: {
                                areaColor: '#2a3a4a',
                                borderColor: '#4a5a6a',
                                borderWidth: 1
                            },
                            emphasis: {
                                label: {
                                    show: true,
                                    color: '#ffd700',
                                    fontSize: 14
                                },
                                itemStyle: {
                                    areaColor: '#4a6a7a'
                                }
                            },
                            regions: Object.keys(worldData).map(name => ({
                                name: name,
                                itemStyle: {
                                    areaColor: worldColors[name],
                                    borderColor: '#fff',
                                    borderWidth: 1
                                },
                                emphasis: {
                                    itemStyle: {
                                        areaColor: worldColors[name],
                                        shadowBlur: 20,
                                        shadowColor: 'rgba(0, 0, 0, 0.5)'
                                    }
                                }
                            }))
                        },
                        
                        series: [{
                            type: 'map',
                            map: 'world',
                            geoIndex: 0,
                            data: data,
                            nameMap: worldNameMap
                        }, {
                            type: 'scatter',
                            coordinateSystem: 'geo',
                            data: [
                                { name: '王都', value: [116, 40, 100], symbol: 'pin', symbolSize: 40, itemStyle: { color: '#ffd700' } },
                                { name: '精灵城', value: [130, 52, 80], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#81c784' } },
                                { name: '矮人堡', value: [75, 43, 80], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#ffb74d' } },
                                { name: '圣坛', value: [115, -5, 60], symbol: 'pin', symbolSize: 30, itemStyle: { color: '#ffd700' } }
                            ],
                            label: {
                                show: true,
                                formatter: '{b}',
                                position: 'bottom',
                                color: '#ffd700',
                                fontSize: 12
                            }
                        }]
                    };
                    
                    chart.setOption(option, true);
                });
        }
        
        // 切换地图
        function switchMap() {
            if (currentMap === 'central') {
                loadWorldMap();
            } else {
                loadCentralPlainsMap();
            }
        }
        
        // 初始化加载中部平原地图
        loadCentralPlainsMap();
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
