<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
        }
        .panel h1 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .panel p { font-size: 12px; color: #aaa; }
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
        }
        .legend h3 { color: #ffd700; margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; margin: 4px 0; font-size: 11px; }
        .legend-color { width: 16px; height: 16px; border-radius: 3px; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>🦞 世界地图</h1>
        <p>拖拽移动 | 滚轮缩放</p>
    </div>
    <div class="legend">
        <h3>图例</h3>
        <div class="legend-item"><div class="legend-color" style="background:#4fc3f7"></div>人类/已开发</div>
        <div class="legend-item"><div class="legend-color" style="background:#81c784"></div>精灵/农业</div>
        <div class="legend-item"><div class="legend-color" style="background:#ffb74d"></div>矮人/要塞</div>
        <div class="legend-item"><div class="legend-color" style="background:#e57373"></div>兽人区域</div>
        <div class="legend-item"><div class="legend-color" style="background:#ba68c8"></div>龙裔区域</div>
        <div class="legend-item"><div class="legend-color" style="background:#9575cd"></div>深渊族</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff8a65"></div>未开发-中危</div>
        <div class="legend-item"><div class="legend-color" style="background:#ef5350"></div>未开发-高危</div>
    </div>
    <div id="map"></div>
    
    <script>
        const chart = echarts.init(document.getElementById('map'));
        
        // 省份颜色映射
        const provinceStyle = {
            '北京': '#4fc3f7', '天津市': '#4fc3f7', '河北省': '#ef5350', '山西省': '#ef5350',
            '内蒙古自治区': '#ff8a65', '辽宁省': '#ffb74d', '吉林省': '#ff8a65', '黑龙江省': '#ff8a65',
            '上海市': '#4fc3f7', '江苏省': '#81c784', '浙江省': '#81c784', '安徽省': '#a1887f',
            '福建省': '#81c784', '江西省': '#ff8a65', '山东省': '#81c784', '河南省': '#4fc3f7',
            '湖北省': '#ff8a65', '湖南省': '#ff8a65', '广东省': '#4fc3f7', '广西壮族自治区': '#4db6ac',
            '海南省': '#ef5350', '重庆市': '#ffb74d', '四川省': '#ff8a65', '贵州省': '#ff8a65',
            '云南省': '#ff8a65', '西藏自治区': '#ffb74d', '陕西省': '#ef5350', '甘肃省': '#ef5350',
            '青海省': '#ff8a65', '宁夏回族自治区': '#ffb74d', '新疆维吾尔自治区': '#ffb74d',
            '台湾省': '#ba68c8', '香港特别行政区': '#4fc3f7', '澳门特别行政区': '#4fc3f7'
        };
        
        // 省份信息
        const provinceInfo = {
            '北京': '龙虾城', '天津市': '王家直辖地', '河北省': '寒风原', '山西省': '铁矿山区',
            '内蒙古自治区': '霜狼森林', '辽宁省': '黑石关', '吉林省': '古木森林', '黑龙江省': '幽暗小径',
            '上海市': '银龙河渡口', '江苏省': '东部农场', '浙江省': '金麦城', '安徽省': '药草谷',
            '福建省': '月影镇', '江西省': '古木森林', '山东省': '东部农场', '河南省': '王家直辖地',
            '湖北省': '迷雾沼泽', '湖南省': '南方湿地', '广东省': '河口城', '广西壮族自治区': '边境哨站',
            '海南省': '失落矿坑', '重庆市': '赤岩镇', '四川省': '干燥荒原', '贵州省': '幽暗小径',
            '云南省': '古木森林', '西藏自治区': '主山脉', '陕西省': '铁矿山区', '甘肃省': '寒风原',
            '青海省': '霜狼森林', '宁夏回族自治区': '黑石关', '新疆维吾尔自治区': '主山脉',
            '台湾省': '火山群岛', '香港特别行政区': '河口城', '澳门特别行政区': '河口城'
        };
        
        // 世界国家颜色
        const worldStyle = {
            'Russia': '#e57373', 'Mongolia': '#ba68c8', 'Kazakhstan': '#ffb74d',
            'Japan': '#ba68c8', 'India': '#9575cd', 'Indonesia': '#ba68c8',
            'Vietnam': '#81c784', 'Thailand': '#81c784', 'Myanmar': '#81c784',
            'Laos': '#81c784', 'Cambodia': '#81c784', 'Malaysia': '#81c784',
            'Philippines': '#ba68c8', 'North Korea': '#ba68c8', 'South Korea': '#ba68c8',
            'Uzbekistan': '#d4a855', 'Turkmenistan': '#d4a855', 'Kyrgyzstan': '#ffb74d',
            'Tajikistan': '#ffb74d', 'Afghanistan': '#d4a855', 'Pakistan': '#9575cd',
            'Nepal': '#9575cd', 'Bhutan': '#9575cd', 'Bangladesh': '#9575cd',
            'Sri Lanka': '#9575cd', 'Iran': '#d4a855'
        };
        
        // 国家信息
        const worldInfo = {
            'Russia': '北境荒原', 'Mongolia': '风暴高原', 'Kazakhstan': '主山脉',
            'Japan': '火山群岛', 'India': '深渊边境', 'Indonesia': '龙族圣地',
            'Vietnam': '南方森林', 'Thailand': '南方森林', 'Myanmar': '南方森林',
            'North Korea': '风暴高原', 'South Korea': '风暴高原'
        };
        
        async function init() {
            try {
                // 加载地图
                const [world, china] = await Promise.all([
                    fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json').then(r => r.json()),
                    fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r => r.json())
                ]);
                
                // 移除China，添加省份
                const features = world.features.filter(f => f.properties.name !== 'China');
                
                // 处理中国省份 - 使用阿里云的GeoJSON格式
                if (china.features) {
                    china.features.forEach(f => {
                        // 阿里云GeoJSON的name是完整的省份名
                        const name = f.properties.name;
                        if (name) {
                            features.push({
                                type: 'Feature',
                                properties: { name: name },
                                geometry: f.geometry
                            });
                        }
                    });
                }
                
                echarts.registerMap('combined', { type: 'FeatureCollection', features });
                
                // 准备数据
                const data = [];
                
                // 中国省份
                Object.keys(provinceStyle).forEach(name => {
                    data.push({
                        name: name,
                        value: 1,
                        itemStyle: {
                            areaColor: provinceStyle[name],
                            borderColor: '#fff',
                            borderWidth: 1
                        }
                    });
                });
                
                // 世界国家
                Object.keys(worldStyle).forEach(name => {
                    data.push({
                        name: name,
                        value: 1,
                        itemStyle: {
                            areaColor: worldStyle[name],
                            borderColor: '#fff',
                            borderWidth: 1
                        }
                    });
                });
                
                chart.setOption({
                    backgroundColor: '#1a3a5c',
                    tooltip: {
                        formatter: p => {
                            const name = provinceInfo[p.name] || worldInfo[p.name] || p.name;
                            return `<b style="color:#ffd700">${name}</b>`;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'combined',
                        roam: true,
                        zoom: 2.5,
                        center: [100, 40],
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 6,
                            formatter: p => {
                                const name = provinceInfo[p.name] || worldInfo[p.name] || p.name;
                                return name.length > 4 ? name.slice(0, 3) + '..' : name;
                            }
                        },
                        itemStyle: {
                            areaColor: '#3d5a4a',
                            borderColor: '#7ab8a8',
                            borderWidth: 1
                        },
                        emphasis: {
                            label: { color: '#ffd700', fontSize: 10 },
                            itemStyle: { borderColor: '#ffd700', borderWidth: 2 }
                        },
                        data: data
                    }]
                });
            } catch (e) {
                console.error('加载失败:', e);
                document.body.innerHTML = '<div style="color:#fff;text-align:center;padding:100px;">地图加载失败，请刷新重试</div>';
            }
        }
        
        init();
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
