<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <script src="assets/echarts.min.js"></script>
    <script src="assets/geo-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-width: 320px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .panel h1 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .panel p { font-size: 12px; color: #aaa; line-height: 1.5; }
        .panel .status { margin-top: 10px; font-size: 11px; color: #81c784; }
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            font-size: 11px;
        }
        .legend h3 { color: #ffd700; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; margin: 2px 0; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            font-size: 11px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .controls h3 { color: #ffd700; margin-bottom: 8px; }
        .controls label { display: block; margin: 4px 0; cursor: pointer; }
        .controls input { margin-right: 5px; }
    </style>
</head>
<body>

        // ========== 地图核心代码 ==========
        const chart = echarts.init(document.getElementById('map'));

        async function loadGeoJSON(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) {
                return null;
            }
        }
        
        async function init() {
            try {
                setStatus('加载地图数据...');
                const world = WORLD_DATA;
                const china = CHINA_DATA;
                
                if (!world || !china) {
                    setStatus('✗ 加载失败');
                    return;
                }
                
                const asianCountries = [
                    'Japan', 'South Korea', 'North Korea', 'Mongolia',
                    'Vietnam', 'Laos', 'Cambodia', 'Thailand', 'Myanmar', 'Malaysia', 'Singapore', 'Indonesia', 'Brunei', 'Philippines', 'East Timor',
                    'India', 'Pakistan', 'Bangladesh', 'Sri Lanka', 'Nepal', 'Bhutan', 'Maldives',
                    'Kazakhstan', 'Uzbekistan', 'Turkmenistan', 'Kyrgyzstan', 'Tajikistan', 'Afghanistan',
                    'Iran', 'Iraq', 'Syria', 'Jordan', 'Lebanon', 'Israel', 'Palestine', 'Turkey', 'Georgia', 'Armenia', 'Azerbaijan',
                    'Saudi Arabia', 'Yemen', 'Oman', 'United Arab Emirates', 'Qatar', 'Bahrain', 'Kuwait', 'Cyprus',
                    'Russia'
                ];
                
                let features = world.features.filter(f => asianCountries.includes(f.properties.name));
                
                if (china?.features) {
                    china.features.forEach(f => {
                        if (f.properties?.name) {
                            features.push({ type: 'Feature', properties: { name: f.properties.name }, geometry: f.geometry });
                        }
                    });
                }
                
                setStatus('渲染地图...');
                
                const data = [];
                features.forEach(f => {
                    const name = f.properties.name;
                    const info = CONFIG.regions[name];
                    if (info) {
                        data.push({ name, value: 1, itemStyle: { areaColor: CONFIG.races[info.race].color } });
                    } else {
                        data.push({ name, value: 0, itemStyle: { areaColor: '#3d5a4a' } });
                    }
                });
                
                echarts.registerMap('world', { type: 'FeatureCollection', features });
                
                chart.setOption({
                    backgroundColor: '#1a3a5c',
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(26, 26, 46, 0.95)',
                        borderColor: '#4a4a6a',
                        borderWidth: 1,
                        padding: [10, 15],
                        textStyle: { color: '#fff', fontSize: 12 },
                        formatter: function(params) {
                            const info = CONFIG.regions[params.name];
                            if (!info) return '<b style="color:#ffd700">' + params.name + '</b>';
                            
                            const d = info.danger;
                            const dangerColor = d.includes('极高') ? '#ef5350' : d.includes('高') ? '#e57373' : d.includes('中高') ? '#ff8a65' : d.includes('中') ? '#ffb74d' : '#81c784';
                            const s = info.status;
                            const statusIcon = s === '禁地' ? '⚠️ ' : s === '圣地' ? '✨ ' : s === '已开发' ? '🏘️ ' : s === '部分开发' ? '🔨 ' : '🌲 ';
                            
                            let html = '<div style="min-width:220px;max-width:300px;">' +
                                '<div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">' + statusIcon + info.name + '</div>' +
                                '<div style="line-height:1.8;margin-bottom:8px;">' +
                                '<div><span style="color:#87ceeb;">类型：</span><span style="color:' + CONFIG.races[info.race].color + ';font-weight:bold;">' + CONFIG.races[info.race].name + '</span></div>' +
                                '<div><span style="color:#87ceeb;">状态：</span>' + info.status + '</div>' +
                                '<div><span style="color:#87ceeb;">危险：</span><span style="color:' + dangerColor + ';font-weight:bold;">' + info.danger + '</span></div>';
                            if (info.level) html += '<div><span style="color:#87ceeb;">等级：</span><span style="color:#b39ddb;font-weight:bold;">Lv.' + info.level + '</span></div>';
                            if (info.blood) html += '<div><span style="color:#87ceeb;">血脉：</span>' + info.blood + '</div>';
                            html += '</div><div style="color:#b0b0b0;font-size:11px;line-height:1.6;padding-top:6px;border-top:1px solid #4a4a6a;">' + info.desc + '</div></div>';
                            return html;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'world',
                        roam: true,
                        zoom: 1.2,
                        center: [80, 30],
                        label: { show: true, color: '#fff', fontSize: 6, formatter: p => { const i = CONFIG.regions[p.name]; return i ? (i.name.length > 4 ? i.name.slice(0,3)+'..' : i.name) : ''; } },
                        itemStyle: { areaColor: '#3d5a4a', borderColor: '#7ab8a8', borderWidth: 1 },
                        emphasis: { label: { color: '#ffd700', fontSize: 10 }, itemStyle: { borderColor: '#ffd700', borderWidth: 2 } },
                        data: data
                    }]
                });
                
                setStatus('✓ 加载完成');
                updateInfo();
                
            } catch (e) {
                console.error(e);
                setStatus('✗ 加载失败');
            }
        }
        
        function setStatus(t) { statusEl.textContent = t; }
        
        function updateInfo() {
            const c = { '已开发': 0, '部分开发': 0, '未开发': 0, '圣地': 0, '禁地': 0, '无人区': 0 };
            Object.values(CONFIG.regions).forEach(i => { if (c[i.status] !== undefined) c[i.status]++; });
            const t = Object.values(c).reduce((a, b) => a + b, 0);
            const d = c['已开发'] + c['圣地'], p = c['部分开发'], u = c['未开发'] + c['禁地'] + c['无人区'];
            infoEl.innerHTML = '<b>统计(' + t + '):</b> 已开发 ' + d + '(' + Math.round(d/t*100) + '%) | 部分 ' + p + '(' + Math.round(p/t*100) + '%) | 未开发 ' + u + '(' + Math.round(u/t*100) + '%)';
        }
        
        document.querySelectorAll('.controls input').forEach(cb => {
            cb.addEventListener('change', function() {
                raceVisible[this.dataset.race] = this.checked;
                const nd = [];
                chart.getOption().series[0].data.forEach(item => {
                    const info = CONFIG.regions[item.name];
                    if (info && raceVisible[info.race]) {
                        nd.push({ name: item.name, value: 1, itemStyle: { areaColor: CONFIG.races[info.race].color } });
                    } else if (info) {
                        nd.push({ name: item.name, value: 0, itemStyle: { areaColor: '#2a2a3a' } });
                    } else {
                        nd.push(item);
                    }
                });
                chart.setOption({ series: [{ data: nd }] });
            });
        });
        
        init();
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
