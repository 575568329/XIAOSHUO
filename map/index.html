<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; }
        
        #map {
            width: 100vw;
            height: 100vh;
        }
        
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 280px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        
        .legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-height: 350px;
            overflow-y: auto;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
        
        .ol-popup {
            position: absolute;
            background: rgba(26, 26, 46, 0.98);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            bottom: 12px;
            left: -160px;
        }
        .ol-popup:after, .ol-popup:before {
            top: 100%;
            border: solid transparent;
            content: " ";
            height: 0;
            width: 0;
            position: absolute;
            pointer-events: none;
        }
        .ol-popup:after {
            border-top-color: rgba(26, 26, 46, 0.98);
            border-width: 10px;
            left: 50%;
            margin-left: -10px;
        }
        .popup-title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        .popup-info { font-size: 13px; line-height: 1.8; }
        .popup-info p { margin: 4px 0; }
        .popup-info strong { color: #87ceeb; }
        .popup-info .race { color: #90ee90; }
        .popup-info .danger-high { color: #ff6b6b; }
        .popup-info .danger-medium { color: #ffb74d; }
        .popup-info .danger-low { color: #81c784; }
        .popup-info ul { margin: 5px 0 5px 20px; }
        .popup-close {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .popup-close:hover { color: #fff; }
        
        .ol-control button {
            background: rgba(26, 26, 46, 0.95) !important;
            color: #fff !important;
            border: 1px solid #4a4a6a !important;
        }
        .ol-control button:hover {
            background: #3a3a5a !important;
        }
        
        /* 隐藏底图版权 */
        .ol-attribution { display: none; }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🦞 龙虾系统 - 世界地图</h1>
        <p>点击区域查看信息<br>拖拽移动，滚轮缩放</p>
    </div>
    
    <div class="legend">
        <h3>🗺️ 图例</h3>
        <div class="legend-item"><div class="legend-color" style="background: #4fc3f7;"></div><span>人类区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #81c784;"></div><span>精灵/森林</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb74d;"></div><span>矮人/山脉</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #e57373;"></div><span>兽人/荒原</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ba68c8;"></div><span>龙裔区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9575cd;"></div><span>深渊族</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ff5252;"></div><span>裂缝危险区</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #4a90d9;"></div><span>河流</span></div>
    </div>
    
    <div id="popup" class="ol-popup">
        <button class="popup-close" onclick="closePopup()">×</button>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-info" id="popup-info"></div>
    </div>
    
    <div id="map"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        // 区域数据
        const locationData = {
            iceDragon: {
                name: "冰龙遗迹",
                race: "龙裔（古代）",
                danger: "极高",
                description: "传说中龙族最后的北方据点，现在是废墟。",
                features: ["古代龙族建筑", "封印的入口", "极寒环境"]
            },
            north: {
                name: "北境荒原",
                race: "北境人类、战吼兽人",
                danger: "高",
                description: "寒冷的北方荒原，北境人类和兽人部落在此生存。",
                features: ["严寒气候", "兽人部落", "佣兵聚集地"]
            },
            storm: {
                name: "风暴高原",
                race: "蓝龙裔",
                danger: "中高",
                description: "雷电交加的高原，蓝龙裔的领地。",
                features: ["雷电魔法", "蓝龙裔部落", "稀有矿石"]
            },
            mountain: {
                name: "主山脉",
                race: "矮人（山脉矮人、深渊矮人）",
                danger: "中",
                description: "巨大的山脉系统，矮人的地下王国。",
                features: ["矮人锻造", "地下城市", "矿脉丰富"]
            },
            forest: {
                name: "古老森林",
                race: "精灵（高等精灵、木精灵）",
                danger: "低-中",
                description: "神秘的古老森林，精灵族的家园。",
                features: ["精灵魔法", "自然神殿", "龙族遗迹"]
            },
            plains: {
                name: "中部平原",
                race: "人类（平原血脉）",
                danger: "低",
                description: "肥沃的平原，人类王国的核心区域。主角可能在此开始冒险。",
                features: ["人类王都", "贸易中心", "佣兵公会"]
            },
            volcano: {
                name: "火山群岛",
                race: "红龙裔",
                danger: "高",
                description: "活跃的火山群岛，红龙裔的领地。",
                features: ["火焰魔法", "火山活动", "稀有材料"]
            },
            desert: {
                name: "沙漠区",
                race: "人类（沙漠血脉）",
                danger: "中",
                description: "炎热的沙漠，沙漠人类的家园和贸易城邦。",
                features: ["绿洲城市", "商队路线", "古老遗迹"]
            },
            abyss: {
                name: "深渊边境",
                race: "深渊族",
                danger: "中高",
                description: "被放逐者的土地，深渊族居住的神秘区域。",
                features: ["深渊族部落", "被误解的种族", "隐藏的真相"]
            },
            rift: {
                name: "裂缝荒原",
                race: "无（危险区）",
                danger: "极高",
                description: "裂缝集中区域，龙族曾在此与魔族战斗。现在依然危险。",
                features: ["异界裂缝", "魔族残留", "龙族战场遗迹"]
            },
            sanctuary: {
                name: "龙族圣地",
                race: "龙裔（银龙裔）",
                danger: "低（圣地）",
                description: "银龙裔守护的圣坛，偶尔会收到意义不明的信号。",
                features: ["银龙裔圣坛", "神秘信号", "龙族遗迹"]
            },
            southForest: {
                name: "南方森林",
                race: "精灵（木精灵）",
                danger: "低-中",
                description: "南方的茂密森林，木精灵的狩猎场。",
                features: ["木精灵部落", "狩猎场", "草药丰富"]
            },
            capital: {
                name: "人类王都",
                race: "人类",
                danger: "低",
                description: "中部平原最大的人类城市，贸易和政治中心。",
                features: ["王宫", "佣兵公会", "地精商会"]
            },
            elfCity: {
                name: "精灵主城",
                race: "高等精灵",
                danger: "低",
                description: "高等精灵的华丽城市，魔法和知识的中心。",
                features: ["魔法学院", "月光神殿", "古老图书馆"]
            },
            dwarfFort: {
                name: "矮人要塞",
                race: "矮人",
                danger: "低",
                description: "矮人的地下要塞，锻造和采矿的中心。",
                features: ["大锻造场", "矿道入口", "矮人酒馆"]
            },
            altar: {
                name: "银龙圣坛",
                race: "银龙裔",
                danger: "低",
                description: "银龙裔守护的圣坛核心，接收神秘信号的地点。",
                features: ["古老圣坛", "信号接收点", "龙族遗物"]
            }
        };
        
        // 区域样式
        const styles = {
            human: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(79, 195, 247, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#4fc3f7', width: 2 })
            }),
            elf: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(129, 199, 132, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#81c784', width: 2 })
            }),
            dwarf: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(255, 183, 77, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#ffb74d', width: 2 })
            }),
            orc: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(229, 115, 115, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#e57373', width: 2 })
            }),
            dragon: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(186, 104, 200, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#ba68c8', width: 2 })
            }),
            abyss: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(149, 117, 205, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#9575cd', width: 2 })
            }),
            rift: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(255, 82, 82, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#ff5252', width: 2 })
            }),
            ice: new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(216, 232, 240, 0.8)' }),
                stroke: new ol.style.Stroke({ color: '#b8d4e3', width: 2 })
            }),
            city: new ol.style.Style({
                image: new ol.style.Circle({
                    radius: 8,
                    fill: new ol.style.Fill({ color: '#ffd700' }),
                    stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                })
            }),
            river: new ol.style.Style({
                stroke: new ol.style.Stroke({ color: '#4a90d9', width: 4, opacity: 0.7 })
            })
        };
        
        // 坐标转换（简单墨卡托投影）
        function toCoord(lon, lat) {
            return ol.proj.fromLonLat([lon, lat]);
        }
        
        // 创建区域多边形
        function createPolygon(coords, style, id) {
            const feature = new ol.Feature({
                geometry: new ol.geom.Polygon([coords.map(c => toCoord(c[0], c[1]))]),
                id: id
            });
            feature.setStyle(style);
            return feature;
        }
        
        // 创建河流线
        function createLine(coords, style) {
            const feature = new ol.Feature({
                geometry: new ol.geom.LineString(coords.map(c => toCoord(c[0], c[1])))
            });
            feature.setStyle(style);
            return feature;
        }
        
        // 创建城市点
        function createPoint(lon, lat, style, id) {
            const feature = new ol.Feature({
                geometry: new ol.geom.Point(toCoord(lon, lat)),
                id: id
            });
            feature.setStyle(style);
            return feature;
        }
        
        // 区域数据（经纬度坐标）
        const features = [];
        
        // 北极冰盖
        features.push(createPolygon([
            [-40, 75], [40, 75], [40, 85], [-40, 85]
        ], styles.ice, 'iceDragon'));
        
        // 北境荒原
        features.push(createPolygon([
            [-20, 55], [20, 58], [25, 50], [15, 45], [0, 47], [-15, 50]
        ], styles.orc, 'north'));
        
        // 风暴高原
        features.push(createPolygon([
            [35, 52], [55, 55], [60, 48], [50, 42], [38, 45]
        ], styles.dragon, 'storm'));
        
        // 主山脉
        features.push(createPolygon([
            [-25, 45], [5, 42], [15, 38], [10, 32], [-5, 34], [-20, 38]
        ], styles.dwarf, 'mountain'));
        
        // 古老森林
        features.push(createPolygon([
            [18, 42], [45, 40], [52, 32], [42, 27], [28, 30], [20, 35]
        ], styles.elf, 'forest'));
        
        // 中部平原
        features.push(createPolygon([
            [-20, 35], [12, 38], [20, 30], [15, 22], [0, 24], [-15, 28]
        ], styles.human, 'plains'));
        
        // 火山群岛
        features.push(createPolygon([
            [60, 35], [70, 38], [72, 32], [65, 28], [58, 30]
        ], styles.dragon, 'volcano'));
        
        // 沙漠区
        features.push(createPolygon([
            [-18, 22], [15, 25], [22, 15], [12, 8], [-5, 10], [-15, 15]
        ], styles.human, 'desert'));
        
        // 深渊边境
        features.push(createPolygon([
            [48, 28], [62, 32], [65, 22], [55, 15], [45, 20]
        ], styles.abyss, 'abyss'));
        
        // 裂缝荒原
        features.push(createPolygon([
            [5, 8], [30, 12], [38, 2], [28, -8], [10, -5], [2, 2]
        ], styles.rift, 'rift'));
        
        // 龙族圣地
        features.push(createPolygon([
            [32, -5], [52, 0], [55, -12], [42, -18], [30, -12]
        ], styles.dragon, 'sanctuary'));
        
        // 南方森林
        features.push(createPolygon([
            [15, -10], [35, -8], [38, -22], [25, -28], [12, -20]
        ], styles.elf, 'southForest'));
        
        // 河流
        features.push(createLine([
            [0, 40], [8, 32], [15, 25], [25, 18], [35, 12]
        ], styles.river));
        
        features.push(createLine([
            [5, 38], [10, 28], [12, 18], [14, 8]
        ], styles.river));
        
        // 城市
        features.push(createPoint(0, 30, styles.city, 'capital'));
        features.push(createPoint(35, 35, styles.city, 'elfCity'));
        features.push(createPoint(-5, 38, styles.city, 'dwarfFort'));
        features.push(createPoint(42, -10, styles.city, 'altar'));
        
        // 创建矢量图层
        const vectorSource = new ol.source.Vector({
            features: features
        });
        
        const vectorLayer = new ol.layer.Vector({
            source: vectorSource
        });
        
        // 创建地图（使用简化的世界地图背景）
        const map = new ol.Map({
            target: 'map',
            layers: [
                // 简单的海洋背景
                new ol.layer.Tile({
                    source: new ol.source.XYZ({
                        url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                        attributions: []
                    }),
                    opacity: 0.3
                }),
                vectorLayer
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([15, 25]),
                zoom: 3,
                minZoom: 2,
                maxZoom: 8
            })
        });
        
        // 弹窗覆盖层
        const popup = new ol.Overlay({
            element: document.getElementById('popup'),
            autoPan: {
                animation: { duration: 250 }
            }
        });
        map.addOverlay(popup);
        
        // 关闭弹窗
        function closePopup() {
            popup.setPosition(undefined);
        }
        
        // 显示弹窗
        function showPopup(id, coordinate) {
            const data = locationData[id];
            if (!data) return;
            
            const title = document.getElementById('popup-title');
            const info = document.getElementById('popup-info');
            
            const dangerClass = data.danger.includes("极高") ? "danger-high" : 
                               data.danger.includes("高") || data.danger.includes("中高") ? "danger-medium" : "danger-low";
            
            title.textContent = data.name;
            info.innerHTML = `
                <p><strong>主要种族：</strong><span class="race">${data.race}</span></p>
                <p><strong>危险等级：</strong><span class="${dangerClass}">${data.danger}</span></p>
                <p><strong>描述：</strong>${data.description}</p>
                <p><strong>特点：</strong></p>
                <ul>${data.features.map(f => `<li>${f}</li>`).join('')}</ul>
            `;
            
            popup.setPosition(coordinate);
        }
        
        // 点击事件
        map.on('click', function(evt) {
            const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                return feature;
            });
            
            if (feature) {
                const id = feature.get('id');
                if (id) {
                    showPopup(id, evt.coordinate);
                }
            } else {
                closePopup();
            }
        });
        
        // 鼠标样式
        map.on('pointermove', function(e) {
            const feature = map.forEachFeatureAtPixel(e.pixel, function(feature) {
                return feature;
            });
            map.getTargetElement().style.cursor = feature ? 'pointer' : '';
        });
    </script>
</body>
</html>
