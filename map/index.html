<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: #1a1a2e;
            overflow: hidden;
        }
        
        #map {
            width: 100vw;
            height: 100vh;
        }
        
        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 280px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        
        .legend {
            position: fixed;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🦞 龙虾系统 - 世界地图</h1>
        <p>点击区域查看信息<br>拖拽移动，滚轮缩放</p>
    </div>
    
    <div class="legend">
        <h3>🗺️ 图例</h3>
        <div class="legend-item"><div class="legend-color" style="background: #4fc3f7;"></div><span>人类区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #81c784;"></div><span>精灵/森林</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb74d;"></div><span>矮人/山脉</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #e57373;"></div><span>兽人/荒原</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ba68c8;"></div><span>龙裔区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9575cd;"></div><span>深渊族</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ff5252;"></div><span>裂缝危险区</span></div>
    </div>
    
    <div id="map"></div>
    
    <script>
        // 区域数据
        const regionData = {
            '北境荒原': { 
                race: '北境人类、战吼兽人', 
                danger: '高',
                description: '寒冷的北方荒原，北境人类和兽人部落在此生存。',
                features: '严寒气候、兽人部落、佣兵聚集地',
                value: 80
            },
            '风暴高原': { 
                race: '蓝龙裔', 
                danger: '中高',
                description: '雷电交加的高原，蓝龙裔的领地。',
                features: '雷电魔法、蓝龙裔部落、稀有矿石',
                value: 70
            },
            '主山脉': { 
                race: '矮人（山脉矮人、深渊矮人）', 
                danger: '中',
                description: '巨大的山脉系统，矮人的地下王国。',
                features: '矮人锻造、地下城市、矿脉丰富',
                value: 60
            },
            '古老森林': { 
                race: '精灵（高等精灵、木精灵）', 
                danger: '低-中',
                description: '神秘的古老森林，精灵族的家园。',
                features: '精灵魔法、自然神殿、龙族遗迹',
                value: 50
            },
            '中部平原': { 
                race: '人类（平原血脉）', 
                danger: '低',
                description: '肥沃的平原，人类王国的核心区域。主角可能在此开始冒险。',
                features: '人类王都、贸易中心、佣兵公会',
                value: 30
            },
            '火山群岛': { 
                race: '红龙裔', 
                danger: '高',
                description: '活跃的火山群岛，红龙裔的领地。',
                features: '火焰魔法、火山活动、稀有材料',
                value: 85
            },
            '沙漠区': { 
                race: '人类（沙漠血脉）', 
                danger: '中',
                description: '炎热的沙漠，沙漠人类的家园和贸易城邦。',
                features: '绿洲城市、商队路线、古老遗迹',
                value: 55
            },
            '深渊边境': { 
                race: '深渊族', 
                danger: '中高',
                description: '被放逐者的土地，深渊族居住的神秘区域。',
                features: '深渊族部落、被误解的种族、隐藏的真相',
                value: 75
            },
            '裂缝荒原': { 
                race: '无（危险区）', 
                danger: '极高',
                description: '裂缝集中区域，龙族曾在此与魔族战斗。',
                features: '异界裂缝、魔族残留、龙族战场遗迹',
                value: 100
            },
            '龙族圣地': { 
                race: '龙裔（银龙裔）', 
                danger: '低（圣地）',
                description: '银龙裔守护的圣坛，偶尔会收到意义不明的信号。',
                features: '银龙裔圣坛、神秘信号、龙族遗迹',
                value: 20
            },
            '南方森林': { 
                race: '精灵（木精灵）', 
                danger: '低-中',
                description: '南方的茂密森林，木精灵的狩猎场。',
                features: '木精灵部落、狩猎场、草药丰富',
                value: 45
            },
            '冰龙遗迹': { 
                race: '龙裔（古代）', 
                danger: '极高',
                description: '传说中龙族最后的北方据点，现在是废墟。',
                features: '古代龙族建筑、封印的入口、极寒环境',
                value: 95
            }
        };
        
        // 地名映射（真实地名 -> 奇幻地名）
        const nameMap = {
            // 中国 -> 中部平原
            'China': '中部平原',
            // 俄罗斯 -> 北境荒原
            'Russia': '北境荒原',
            // 蒙古 -> 风暴高原
            'Mongolia': '风暴高原',
            // 哈萨克斯坦 -> 主山脉
            'Kazakhstan': '主山脉',
            // 日本 -> 火山群岛
            'Japan': '火山群岛',
            // 印度 -> 深渊边境
            'India': '深渊边境',
            // 印度尼西亚 -> 龙族圣地
            'Indonesia': '龙族圣地',
            // 越南 -> 南方森林
            'Vietnam': '南方森林',
            // 泰国 -> 南方森林
            'Thailand': '南方森林',
            // 缅甸 -> 南方森林
            'Myanmar': '南方森林',
            // 老挝 -> 南方森林
            'Laos': '南方森林',
            // 柬埔寨 -> 南方森林
            'Cambodia': '南方森林',
            // 马来西亚 -> 南方森林
            'Malaysia': '南方森林',
            // 菲律宾 -> 火山群岛
            'Philippines': '火山群岛',
            // 朝鲜 -> 风暴高原
            'North Korea': '风暴高原',
            // 韩国 -> 风暴高原
            'South Korea': '风暴高原',
            // 台湾 -> 中部平原
            'Taiwan': '中部平原',
            // 乌兹别克斯坦 -> 沙漠区
            'Uzbekistan': '沙漠区',
            // 土库曼斯坦 -> 沙漠区
            'Turkmenistan': '沙漠区',
            // 吉尔吉斯斯坦 -> 主山脉
            'Kyrgyzstan': '主山脉',
            // 塔吉克斯坦 -> 主山脉
            'Tajikistan': '主山脉',
            // 阿富汗 -> 沙漠区
            'Afghanistan': '沙漠区',
            // 巴基斯坦 -> 深渊边境
            'Pakistan': '深渊边境',
            // 尼泊尔 -> 深渊边境
            'Nepal': '深渊边境',
            // 不丹 -> 深渊边境
            'Bhutan': '深渊边境',
            // 孟加拉国 -> 深渊边境
            'Bangladesh': '深渊边境',
            // 斯里兰卡 -> 深渊边境
            'Sri Lanka': '深渊边境',
            // 伊朗 -> 沙漠区
            'Iran': '沙漠区',
            // 冰岛 -> 冰龙遗迹
            'Iceland': '冰龙遗迹',
            // 格陵兰 -> 冰龙遗迹
            'Greenland': '冰龙遗迹',
            // 阿拉斯加 -> 北境荒原
            'Alaska': '北境荒原',
            // 加拿大 -> 北境荒原
            'Canada': '北境荒原'
        };
        
        // 区域颜色
        const regionColors = {
            '北境荒原': '#e57373',
            '风暴高原': '#ba68c8',
            '主山脉': '#ffb74d',
            '古老森林': '#81c784',
            '中部平原': '#4fc3f7',
            '火山群岛': '#ba68c8',
            '沙漠区': '#4fc3f7',
            '深渊边境': '#9575cd',
            '裂缝荒原': '#ff5252',
            '龙族圣地': '#ba68c8',
            '南方森林': '#81c784',
            '冰龙遗迹': '#b8d4e3'
        };
        
        // 加载世界地图
        fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json')
            .then(response => response.json())
            .then(worldJson => {
                // 注册地图
                echarts.registerMap('world', worldJson);
                
                // 准备数据
                const data = [];
                Object.keys(regionData).forEach(name => {
                    data.push({
                        name: name,
                        value: regionData[name].value,
                        itemStyle: {
                            areaColor: regionColors[name] || '#3d5a4a'
                        }
                    });
                });
                
                // 初始化图表
                const chart = echarts.init(document.getElementById('map'));
                
                const option = {
                    backgroundColor: '#1a1a2e',
                    
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(26, 26, 46, 0.95)',
                        borderColor: '#4a4a6a',
                        borderWidth: 1,
                        textStyle: {
                            color: '#fff'
                        },
                        formatter: function(params) {
                            const info = regionData[params.name];
                            if (!info) return params.name;
                            
                            const dangerColor = info.danger.includes('极高') ? '#ff6b6b' : 
                                               info.danger.includes('高') ? '#ffb74d' : '#81c784';
                            
                            return `
                                <div style="padding:5px;">
                                    <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;">${params.name}</div>
                                    <div style="font-size:13px;line-height:1.8;">
                                        <div><span style="color:#87ceeb;">主要种族：</span><span style="color:#90ee90;">${info.race}</span></div>
                                        <div><span style="color:#87ceeb;">危险等级：</span><span style="color:${dangerColor};">${info.danger}</span></div>
                                        <div><span style="color:#87ceeb;">描述：</span>${info.description}</div>
                                        <div><span style="color:#87ceeb;">特点：</span>${info.features}</div>
                                    </div>
                                </div>
                            `;
                        }
                    },
                    
                    visualMap: {
                        show: false,
                        min: 0,
                        max: 100,
                        inRange: {
                            color: ['#3d5a4a', '#4a6a5a', '#5a7a6a']
                        }
                    },
                    
                    geo: {
                        map: 'world',
                        roam: true,
                        zoom: 3,
                        center: [105, 35],
                        scaleLimit: {
                            min: 2,
                            max: 10
                        },
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 10,
                            formatter: function(params) {
                                // 使用映射后的名称
                                return params.name;
                            }
                        },
                        nameMap: nameMap,
                        itemStyle: {
                            areaColor: '#2a3a4a',
                            borderColor: '#4a5a6a',
                            borderWidth: 1
                        },
                        emphasis: {
                            label: {
                                show: true,
                                color: '#ffd700',
                                fontSize: 14
                            },
                            itemStyle: {
                                areaColor: '#4a6a7a'
                            }
                        },
                        regions: Object.keys(regionData).map(name => ({
                            name: name,
                            itemStyle: {
                                areaColor: regionColors[name],
                                borderColor: '#fff',
                                borderWidth: 1
                            },
                            emphasis: {
                                itemStyle: {
                                    areaColor: regionColors[name],
                                    shadowBlur: 20,
                                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                                }
                            }
                        }))
                    },
                    
                    series: [{
                        type: 'map',
                        map: 'world',
                        geoIndex: 0,
                        data: data,
                        nameMap: nameMap
                    }, {
                        // 城市标记
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: [
                            { name: '王都', value: [110, 35, 100], symbol: 'pin', symbolSize: 40, itemStyle: { color: '#ffd700' } },
                            { name: '精灵城', value: [130, 52, 80], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#81c784' } },
                            { name: '矮人堡', value: [75, 43, 80], symbol: 'pin', symbolSize: 35, itemStyle: { color: '#ffb74d' } },
                            { name: '圣坛', value: [115, -5, 60], symbol: 'pin', symbolSize: 30, itemStyle: { color: '#ffd700' } }
                        ],
                        label: {
                            show: true,
                            formatter: '{b}',
                            position: 'bottom',
                            color: '#ffd700',
                            fontSize: 12
                        },
                        tooltip: {
                            formatter: function(params) {
                                return `<div style="font-weight:bold;color:#ffd700;">${params.name}</div>`;
                            }
                        }
                    }]
                };
                
                chart.setOption(option);
                
                // 响应窗口大小变化
                window.addEventListener('resize', function() {
                    chart.resize();
                });
            })
            .catch(error => {
                console.error('加载地图失败:', error);
                document.getElementById('map').innerHTML = '<div style="color:#fff;text-align:center;padding:50px;">地图加载失败，请刷新页面重试</div>';
            });
    </script>
</body>
</html>
