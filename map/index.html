        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-width: 320px;
        }
        .panel h1 { color: #ffd700; font-size: 18px; margin-bottom: 5px; }
        .panel p { font-size: 12px; color: #aaa; line-height: 1.5; }
        .panel .status { margin-top: 10px; font-size: 11px; color: #81c784; }
        .panel .stats { 
            margin-top: 10px; 
            font-size: 10px; 
            color: #87ceeb; 
            border-top: 1px solid #4a4a6a; 
            padding-top: 8px;
            line-height: 1.8;
        }
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            z-index: 1000;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 11px;
        }
        .legend h3 { color: #ffd700; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; margin: 2px 0; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
    </style>
</head>

            'Thailand': { name: '精灵王国', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '香料、精灵工艺品', monsters: '无', flight: '✅ 可飞行', desc: '精灵与人类和平共处的王国。' },
            'Myanmar': { name: '精灵密林', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '灵木、珍稀草药', monsters: '无', flight: '✅ 可飞行', desc: '原始森林，精灵的家园。' },
            'Laos': { name: '精灵山谷', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '灵木、精灵草药', monsters: '无', flight: '✅ 可飞行', desc: '内陆精灵王国。' },
            'Cambodia': { name: '精灵遗迹', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '古代遗物、灵木', monsters: '无', flight: '✅ 可飞行', desc: '古老遗迹与精灵文明的交汇。' },
            'Malaysia': { name: '精灵海岸', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '热带草药、香料', monsters: '无', flight: '✅ 可飞行', desc: '热带雨林与海洋交汇之地。' },
            
            // ===== 第二圈：外围未开发区（中风险）=====
            'Kazakhstan': { name: '矮人草原', color: '#ffb74d', status: '部分开发', danger: '中', race: '矮人', products: '矮人兵器、山铜矿', monsters: '草原狼', flight: '✅ 可飞行', desc: '矮人的草原领地。' },
            'Kyrgyzstan': { name: '矮人山地', color: '#ffb74d', status: '部分开发', danger: '中', race: '矮人', products: '矮人兵器、宝石', monsters: '山地狮', flight: '⚠️ 高海拔', desc: '矮人的高山要塞。' },
            'Tajikistan': { name: '矮人高原', color: '#ffb74d', status: '部分开发', danger: '中', race: '矮人', products: '宝石、山铜矿', monsters: '雪人', flight: '⚠️ 高海拔', desc: '帕米尔高原的矮人领地。' },
            'Uzbekistan': { name: '沙漠商路', color: '#d4a855', status: '部分开发', danger: '中', race: '哥布林', products: '丝绸、香料、沙漠水晶', monsters: '沙虫', flight: '✅ 可飞行', desc: '丝绸之路上的哥布林商路。' },
            'Turkmenistan': { name: '沙漠矿坑', color: '#d4a855', status: '部分开发', danger: '中', race: '哥布林', products: '天然气、沙漠水晶', monsters: '沙漠蝎', flight: '✅ 可飞行', desc: '哥布林的沙漠矿区。' },
            'Afghanistan': { name: '山地矿区', color: '#d4a855', status: '未开发', danger: '中高', race: '哥布林', products: '宝石、古代遗物', monsters: '沙虫、山地巨兽', flight: '⚠️ 需谨慎', desc: '战乱频发的山区。' },
            'Iran': { name: '古老王国', color: '#d4a855', status: '部分开发', danger: '中', race: '哥布林', products: '石油、香料、地毯', monsters: '沙漠狼', flight: '✅ 可飞行', desc: '古老文明的沙漠王国。' },
            'Pakistan': { name: '边境荒原', color: '#ff8a65', status: '未开发', danger: '中高', race: '野兽', products: '无', monsters: '边境巨兽、沙漠狼', flight: '⚠️ 需谨慎', desc: '深渊边境的外围荒原。' },
            'Nepal': { name: '雪山哨站', color: '#ffb74d', status: '部分开发', danger: '中', race: '矮人', products: '高原草药、宝石', monsters: '雪人', flight: '⚠️ 高海拔', desc: '喜马拉雅山麓的哨站。' },
            'Bhutan': { name: '雷龙王国', color: '#ba68c8', status: '已开发', danger: '低', race: '蓝龙裔', products: '雷龙鳞片', monsters: '无', flight: '❌ 禁飞（雷暴）', desc: '雷龙之国，与蓝龙裔有盟约。' },
            'Bangladesh': { name: '河流三角洲', color: '#81c784', status: '已开发', danger: '低', race: '精灵', products: '河鲜、精灵草药', monsters: '无', flight: '✅ 可飞行', desc: '水精灵的家园。' },

            // ===== 第三圈：极外围高风险区（高风险）=====
            'Russia': { name: '极北荒原', color: '#e57373', status: '未开发', danger: '高', race: '野兽', products: '远古晶石（稀有）', monsters: '远古巨兽、冰原狼', flight: '⚠️ 需谨慎', desc: '极北永久冻土，几乎无人居住。传说有远古龙族遗迹。' }
        };
        
        async function loadGeoJSON(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) {
                return null;
            }
        }
        
        async function init() {
            const regionCount = {};
            
            try {
                setStatus('加载世界地图...');
                const world = await loadGeoJSON('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json');
                
                setStatus('加载中部平原...');
                const china = await loadGeoJSON('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
                
                setStatus('加载北境荒原...');
                const russia = await loadGeoJSON('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/russia.geojson');
                
                setStatus('合并地图数据...');
                
                const removeCountries = ['China', 'Russia'];
                let features = world.features.filter(f => !removeCountries.includes(f.properties.name));
                
                // 中国
                let count = 0;
                if (china?.features) {
                    china.features.forEach(f => {
                        if (f.properties?.name) {
                            features.push({ type: 'Feature', properties: { name: f.properties.name }, geometry: f.geometry });
                            count++;
                        }
                    });
                }
                regionCount['中部平原'] = count;
                
                // 俄罗斯
                count = 0;
                if (russia?.features) {
                    console.log('俄罗斯features:', russia.features.length);
                    russia.features.forEach(f => {
                        const name = f.properties?.name_latin || f.properties?.name;
                        if (name) {
                            features.push({ type: 'Feature', properties: { name }, geometry: f.geometry });
                            count++;
                        }
                    });
                }
                regionCount['北境荒原'] = count || 83;
                regionCount['风暴高原'] = 1;
                regionCount['火山群岛'] = 47;
                regionCount['深渊边境'] = 36;
                regionCount['南方森林'] = 7;
                regionCount['主山脉'] = 3;
                regionCount['沙漠区'] = 4;
                
                echarts.registerMap('combined', { type: 'FeatureCollection', features });
                
                setStatus('渲染地图...');
                
                const data = [];
                const allInfo = {};
                
                Object.keys(chinaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: chinaData[name].color } });
                    allInfo[name] = chinaData[name].name;
                });
                
                Object.keys(russiaData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: russiaData[name].color } });
                    allInfo[name] = russiaData[name].name;
                });
                
                Object.keys(otherData).forEach(name => {
                    data.push({ name, value: 1, itemStyle: { areaColor: otherData[name].color } });
                    allInfo[name] = otherData[name].name;
                });
                
                chart.setOption({
                    backgroundColor: '#1a3a5c',
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(26, 26, 46, 0.95)',
                        borderColor: '#4a4a6a',
                        borderWidth: 1,
                        padding: [10, 15],
                        textStyle: { color: '#fff', fontSize: 12 },
                        formatter: function(params) {
                            // 直接查找数据
                            let info = chinaData[params.name] || otherData[params.name] || russiaData[params.name];
                            
                            if (!info) return `<b style="color:#ffd700">${params.name}</b>`;
                            
                            // 状态颜色
                            const statusColor = info.status === '已开发' ? '#81c784' : 
                                               info.status === '未开发' ? '#ff8a65' : 
                                               info.status === '圣地' ? '#ba68c8' :
                                               info.status === '禁地' ? '#ef5350' : '#ffb74d';
                            
                            // 危险等级颜色
                            const dangerColor = info.danger.includes('极高') ? '#ef5350' : 
                                               info.danger.includes('高') ? '#e57373' : 
                                               info.danger.includes('中高') ? '#ff8a65' : 
                                               info.danger.includes('中') ? '#ffb74d' : '#81c784';
                            
                            // 种族颜色
                            const raceColor = info.race.includes('人类') ? '#4fc3f7' :
                                             info.race.includes('精灵') ? '#81c784' :
                                             info.race.includes('矮人') ? '#ffb74d' :
                                             info.race.includes('龙') ? '#ba68c8' :
                                             info.race.includes('深渊') ? '#7e57c2' :
                                             info.race.includes('远古') ? '#ef5350' :
                                             info.race.includes('哥布林') ? '#a1887f' : '#90ee90';
                            
                            // 飞行状态颜色
                            const flightColor = info.flight.includes('✅') ? '#81c784' : 
                                               info.flight.includes('❌') ? '#ef5350' : '#ffb74d';
                            
                            // 禁地特殊标记
                            const namePrefix = info.status === '禁地' ? '⚠️ ' : '';
                            
                            return `
                                <div style="min-width:220px;max-width:300px;">
                                    <div style="font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #4a4a6a;">
                                        ${namePrefix}${info.name}
                                    </div>
                                    <div style="line-height:1.8;margin-bottom:8px;">
                                        <div><span style="color:#87ceeb;">状态：</span><span style="color:${statusColor};font-weight:bold;">${info.status}</span></div>
                                        <div><span style="color:#87ceeb;">危险：</span><span style="color:${dangerColor};font-weight:bold;">${info.danger}</span></div>
                                        <div><span style="color:#87ceeb;">种族：</span><span style="color:${raceColor};font-weight:bold;">${info.race}</span></div>
                                        <div><span style="color:#87ceeb;">飞行：</span><span style="color:${flightColor};font-weight:bold;">${info.flight}</span></div>
                                    </div>
                                    <div style="line-height:1.6;margin-bottom:8px;padding:6px;background:rgba(255,255,255,0.05);border-radius:4px;">
                                        <div style="color:#d4a855;font-size:11px;">📦 产出：${info.products || '无'}</div>
                                        <div style="color:#e57373;font-size:11px;">👾 魔兽：${info.monsters || '无'}</div>
                                    </div>
                                    <div style="color:#b0b0b0;font-size:11px;line-height:1.6;padding-top:6px;border-top:1px solid #4a4a6a;">
                                        ${info.desc}
                                    </div>
                                </div>
                            `;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'combined',
                        roam: true,
                        zoom: 1.8,
                        center: [90, 50],
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 5,
                            formatter: p => {
                                const name = allInfo[p.name] || p.name;
                                return name.length > 3 ? name.slice(0, 2) + '..' : name;
                            }
                        },
                        itemStyle: { areaColor: '#3d5a4a', borderColor: '#7ab8a8', borderWidth: 1 },
                        emphasis: { label: { color: '#ffd700', fontSize: 9 }, itemStyle: { borderColor: '#ffd700', borderWidth: 2 } },
                        data: data
                    }]
                });
                
                setStatus('✓ 加载完成');
                setStats(regionCount);
                
            } catch (e) {
                console.error('加载失败:', e);
                setStatus('✗ 加载失败');
            }
        }
        
        init();
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
