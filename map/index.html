<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾系统 - 世界地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: #1a1a2e;
            overflow: hidden;
        }
        
        .map-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }
        
        .map-container:active { cursor: grabbing; }
        
        .map-wrapper {
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }
        
        .map-svg {
            width: 1400px;
            height: 1000px;
            display: block;
        }
        
        .region {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .region:hover { opacity: 0.8; }
        
        .marker {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .marker:hover { transform: scale(1.3); }
        
        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 280px;
        }
        .info-panel h1 { font-size: 18px; margin-bottom: 5px; color: #ffd700; }
        .info-panel p { font-size: 12px; color: #aaa; line-height: 1.6; }
        .zoom-controls {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }
        .zoom-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #4a4a6a;
            background: rgba(26, 26, 46, 0.95);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .zoom-btn:hover { background: #3a3a5a; }
        
        .legend {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
        }
        .legend h3 { font-size: 14px; margin-bottom: 10px; color: #ffd700; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; border: 1px solid #fff; }
        
        .popup {
            position: fixed;
            display: none;
            background: rgba(26, 26, 46, 0.98);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            border: 1px solid #4a4a6a;
            max-width: 320px;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .popup.active { display: block; }
        .popup-title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        .popup-info { font-size: 13px; line-height: 1.8; }
        .popup-info p { margin: 4px 0; }
        .popup-info strong { color: #87ceeb; }
        .popup-info .race { color: #90ee90; }
        .popup-info .danger-high { color: #ff6b6b; }
        .popup-info .danger-medium { color: #ffb74d; }
        .popup-info .danger-low { color: #81c784; }
        .popup-info ul { margin: 5px 0 5px 20px; }
        .popup-close {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .popup-close:hover { color: #fff; }
        
        .river-label {
            font-size: 10px;
            fill: #4a90d9;
            pointer-events: none;
        }
        
        .region-label {
            font-size: 13px;
            font-weight: bold;
            fill: #fff;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🦞 龙虾系统 - 世界地图</h1>
        <p>点击区域查看信息<br>拖拽移动，滚轮缩放</p>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <button class="zoom-btn" onclick="resetZoom()">⟲</button>
        </div>
    </div>
    
    <div class="legend">
        <h3>🗺️ 图例</h3>
        <div class="legend-item"><div class="legend-color" style="background: #4fc3f7;"></div><span>人类区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #81c784;"></div><span>精灵/森林</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb74d;"></div><span>矮人/山脉</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #e57373;"></div><span>兽人/荒原</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ba68c8;"></div><span>龙裔区域</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #9575cd;"></div><span>深渊族</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ff5252;"></div><span>裂缝危险区</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #4a90d9;"></div><span>河流</span></div>
    </div>
    
    <div class="popup" id="popup">
        <button class="popup-close" onclick="closePopup()">×</button>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-info" id="popup-info"></div>
    </div>
    
    <div class="map-container" id="mapContainer">
        <div class="map-wrapper" id="mapWrapper">
            <svg class="map-svg" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
                <!-- 海洋背景 -->
                <rect width="1400" height="1000" fill="#1a3a5c"/>
                
                <!-- 大陆主体 -->
                <path d="M150,100 L400,70 L600,90 L850,80 L1050,130 L1150,250
                         L1180,400 L1150,550 L1050,680 L900,780 L700,830 
                         L500,850 L320,800 L200,680 L130,520 L110,350 L120,200 Z" 
                      fill="#3d5a4a" stroke="#5a7a6a" stroke-width="4"/>
                
                <!-- 北极冰盖 -->
                <ellipse cx="500" cy="45" rx="250" ry="40" fill="#d8e8f0" opacity="0.9"/>
                <text x="500" y="50" text-anchor="middle" fill="#555" font-size="12">❄️ 北极冰盖</text>
                
                <!-- 冰龙遗迹 -->
                <circle cx="500" cy="45" r="20" fill="#b8d4e3" stroke="#fff" stroke-width="2" class="region" onclick="showPopup('iceDragon')"/>
                
                <!-- 1. 北境地区 -->
                <path d="M200,110 L420,95 L560,110 L580,220 L480,260 L350,240 L240,200 Z" 
                      fill="#7a9aaa" stroke="#9abaca" stroke-width="2" class="region" onclick="showPopup('north')"/>
                <text x="390" y="175" text-anchor="middle" class="region-label">北境荒原</text>
                
                <!-- 2. 风暴高原 -->
                <path d="M800,95 L980,110 L1050,200 L1000,280 L880,250 L820,180 Z" 
                      fill="#6a8a9a" stroke="#8aaaaa" stroke-width="2" class="region" onclick="showPopup('storm')"/>
                <text x="920" y="185" text-anchor="middle" class="region-label">风暴高原</text>
                
                <!-- 3. 主山脉 -->
                <path d="M220,220 L380,200 L480,230 L520,320 L440,380 L340,350 L260,290 Z" 
                      fill="#8a7a6a" stroke="#aa9a8a" stroke-width="2" class="region" onclick="showPopup('mountain')"/>
                <text x="370" y="290" text-anchor="middle" class="region-label">🏔️ 主山脉</text>
                
                <!-- 4. 森林区 -->
                <path d="M540,200 L720,190 L850,230 L870,340 L760,400 L640,370 L560,310 Z" 
                      fill="#4a7a4a" stroke="#6a9a6a" stroke-width="2" class="region" onclick="showPopup('forest')"/>
                <text x="700" y="295" text-anchor="middle" class="region-label">🌲 古老森林</text>
                
                <!-- 5. 中部平原 -->
                <path d="M240,360 L440,380 L550,420 L580,540 L480,600 L350,570 L260,480 Z" 
                      fill="#8aaa6a" stroke="#aaca8a" stroke-width="2" class="region" onclick="showPopup('plains')"/>
                <text x="410" y="480" text-anchor="middle" class="region-label">🏰 中部平原</text>
                
                <!-- 6. 火山群岛（东侧海外） -->
                <ellipse cx="1100" cy="380" rx="70" ry="55" fill="#aa5a3a" stroke="#ca7a5a" stroke-width="2" class="region" onclick="showPopup('volcano')"/>
                <text x="1100" y="385" text-anchor="middle" fill="#fff" font-size="11">🌋 火山群岛</text>
                
                <!-- 7. 沙漠区 -->
                <path d="M280,580 L480,560 L580,610 L620,720 L500,780 L360,750 L280,660 Z" 
                      fill="#d4a855" stroke="#e4c875" stroke-width="2" class="region" onclick="showPopup('desert')"/>
                <text x="440" y="670" text-anchor="middle" class="region-label" fill="#333">🏜️ 沙漠区</text>
                
                <!-- 8. 深渊边境 -->
                <path d="M880,360 L1000,400 L1050,520 L1000,620 L900,580 L850,470 Z" 
                      fill="#5a4a6a" stroke="#7a6a8a" stroke-width="2" class="region" onclick="showPopup('abyss')"/>
                <text x="940" y="490" text-anchor="middle" class="region-label">深渊边境</text>
                
                <!-- 9. 裂缝荒原 -->
                <path d="M420,780 L600,750 L720,800 L760,920 L640,980 L480,950 L400,870 Z" 
                      fill="#4a3a3a" stroke="#6a5a5a" stroke-width="2" class="region" onclick="showPopup('rift')"/>
                <text x="580" y="865" text-anchor="middle" class="region-label" fill="#ff5555">⚡ 裂缝荒原</text>
                
                <!-- 裂缝标记 -->
                <g stroke="#ff3333" stroke-width="3" opacity="0.9">
                    <line x1="520" y1="830" x2="540" y2="860"/>
                    <line x1="560" y1="820" x2="580" y2="870"/>
                    <line x1="610" y1="840" x2="630" y2="890"/>
                </g>
                
                <!-- 10. 龙族圣地 -->
                <path d="M760,920 L920,890 L1020,950 L1000,1020 L880,1050 L780,990 Z" 
                      fill="#c0c0c0" stroke="#e0e0e0" stroke-width="2" class="region" onclick="showPopup('sanctuary')"/>
                <text x="880" y="970" text-anchor="middle" class="region-label" fill="#333">⛩️ 龙族圣地</text>
                
                <!-- 11. 南方森林 -->
                <path d="M620,980 L760,960 L820,1030 L790,1100 L680,1120 L600,1070 Z" 
                      fill="#3a6a3a" stroke="#5a8a5a" stroke-width="2" class="region" onclick="showPopup('southForest')"/>
                <text x="700" y="1040" text-anchor="middle" class="region-label">🌳 南方森林</text>
                
                <!-- 南极冰盖 -->
                <ellipse cx="650" cy="1150" rx="280" ry="45" fill="#d8e8f0" opacity="0.9"/>
                <text x="650" y="1155" text-anchor="middle" fill="#555" font-size="12">❄️ 南极冰盖</text>
                
                <!-- 河流 -->
                <!-- 银龙河 -->
                <path d="M420,320 Q470,410 520,490 Q580,560 680,600 Q780,640 880,660" 
                      stroke="#4a90d9" stroke-width="10" fill="none" opacity="0.5"/>
                <text x="580" y="450" class="river-label" transform="rotate(-25,580,450)">银龙河 →</text>
                
                <!-- 深渊河 -->
                <path d="M460,350 Q490,470 510,590 Q530,710 550,830" 
                      stroke="#4a90d9" stroke-width="8" fill="none" opacity="0.5"/>
                <text x="520" y="590" class="river-label" transform="rotate(85,520,590)">深渊河 ↓</text>
                
                <!-- 北境河 -->
                <path d="M920,160 Q880,120 840,100" 
                      stroke="#4a90d9" stroke-width="6" fill="none" opacity="0.5"/>
                
                <!-- 裂隙河 -->
                <path d="M880,970 Q920,1000 960,1020 Q1000,1050 1050,1070" 
                      stroke="#4a90d9" stroke-width="6" fill="none" opacity="0.5"/>
                
                <!-- 城市标记 -->
                <circle cx="410" cy="480" r="12" fill="#ffd700" stroke="#fff" stroke-width="3" class="marker" onclick="showPopup('capital')"/>
                <text x="410" y="510" text-anchor="middle" fill="#ffd700" font-size="11">王都</text>
                
                <circle cx="700" cy="295" r="10" fill="#81c784" stroke="#fff" stroke-width="2" class="marker" onclick="showPopup('elfCity')"/>
                <text x="700" y="325" text-anchor="middle" fill="#81c784" font-size="11">精灵城</text>
                
                <circle cx="370" cy="290" r="10" fill="#ffb74d" stroke="#fff" stroke-width="2" class="marker" onclick="showPopup('dwarfFort')"/>
                <text x="370" y="320" text-anchor="middle" fill="#ffb74d" font-size="11">矮人堡</text>
                
                <circle cx="880" cy="970" r="10" fill="#ffd700" stroke="#fff" stroke-width="2" class="marker" onclick="showPopup('altar')"/>
            </svg>
        </div>
    </div>
    
    <script>
        // 地图控制
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;
        
        const container = document.getElementById('mapContainer');
        const wrapper = document.getElementById('mapWrapper');
        
        function updateTransform() {
            wrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }
        
        // 拖拽
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });
        
        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });
        
        container.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mouseleave', () => isDragging = false);
        
        // 缩放
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.5, Math.min(3, scale * delta));
            updateTransform();
        });
        
        function zoomIn() {
            scale = Math.min(3, scale * 1.2);
            updateTransform();
        }
        
        function zoomOut() {
            scale = Math.max(0.5, scale / 1.2);
            updateTransform();
        }
        
        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }
        
        // 弹窗数据
        const locationData = {
            iceDragon: {
                name: "冰龙遗迹",
                race: "龙裔（古代）",
                danger: "极高",
                description: "传说中龙族最后的北方据点，现在是废墟。",
                features: ["古代龙族建筑", "封印的入口", "极寒环境"]
            },
            north: {
                name: "北境荒原",
                race: "北境人类、战吼兽人",
                danger: "高",
                description: "寒冷的北方荒原，北境人类和兽人部落在此生存。",
                features: ["严寒气候", "兽人部落", "佣兵聚集地"]
            },
            storm: {
                name: "风暴高原",
                race: "蓝龙裔",
                danger: "中高",
                description: "雷电交加的高原，蓝龙裔的领地。",
                features: ["雷电魔法", "蓝龙裔部落", "稀有矿石"]
            },
            mountain: {
                name: "主山脉",
                race: "矮人（山脉矮人、深渊矮人）",
                danger: "中",
                description: "巨大的山脉系统，矮人的地下王国。",
                features: ["矮人锻造", "地下城市", "矿脉丰富"]
            },
            forest: {
                name: "古老森林",
                race: "精灵（高等精灵、木精灵）",
                danger: "低-中",
                description: "神秘的古老森林，精灵族的家园。",
                features: ["精灵魔法", "自然神殿", "龙族遗迹"]
            },
            plains: {
                name: "中部平原",
                race: "人类（平原血脉）",
                danger: "低",
                description: "肥沃的平原，人类王国的核心区域。主角可能在此开始冒险。",
                features: ["人类王都", "贸易中心", "佣兵公会"]
            },
            volcano: {
                name: "火山群岛",
                race: "红龙裔",
                danger: "高",
                description: "活跃的火山群岛，红龙裔的领地。",
                features: ["火焰魔法", "火山活动", "稀有材料"]
            },
            desert: {
                name: "沙漠区",
                race: "人类（沙漠血脉）",
                danger: "中",
                description: "炎热的沙漠，沙漠人类的家园和贸易城邦。",
                features: ["绿洲城市", "商队路线", "古老遗迹"]
            },
            abyss: {
                name: "深渊边境",
                race: "深渊族",
                danger: "中高",
                description: "被放逐者的土地，深渊族居住的神秘区域。",
                features: ["深渊族部落", "被误解的种族", "隐藏的真相"]
            },
            rift: {
                name: "裂缝荒原",
                race: "无（危险区）",
                danger: "极高",
                description: "裂缝集中区域，龙族曾在此与魔族战斗。现在依然危险。",
                features: ["异界裂缝", "魔族残留", "龙族战场遗迹"]
            },
            sanctuary: {
                name: "龙族圣地",
                race: "龙裔（银龙裔）",
                danger: "低（圣地）",
                description: "银龙裔守护的圣坛，偶尔会收到意义不明的信号。",
                features: ["银龙裔圣坛", "神秘信号", "龙族遗迹"]
            },
            southForest: {
                name: "南方森林",
                race: "精灵（木精灵）",
                danger: "低-中",
                description: "南方的茂密森林，木精灵的狩猎场。",
                features: ["木精灵部落", "狩猎场", "草药丰富"]
            },
            capital: {
                name: "人类王都",
                race: "人类",
                danger: "低",
                description: "中部平原最大的人类城市，贸易和政治中心。",
                features: ["王宫", "佣兵公会", "地精商会"]
            },
            elfCity: {
                name: "精灵主城",
                race: "高等精灵",
                danger: "低",
                description: "高等精灵的华丽城市，魔法和知识的中心。",
                features: ["魔法学院", "月光神殿", "古老图书馆"]
            },
            dwarfFort: {
                name: "矮人要塞",
                race: "矮人",
                danger: "低",
                description: "矮人的地下要塞，锻造和采矿的中心。",
                features: ["大锻造场", "矿道入口", "矮人酒馆"]
            },
            altar: {
                name: "银龙圣坛",
                race: "银龙裔",
                danger: "低",
                description: "银龙裔守护的圣坛核心，接收神秘信号的地点。",
                features: ["古老圣坛", "信号接收点", "龙族遗物"]
            }
        };
        
        // 显示弹窗
        function showPopup(id) {
            const data = locationData[id];
            if (!data) return;
            
            const popup = document.getElementById('popup');
            const title = document.getElementById('popup-title');
            const info = document.getElementById('popup-info');
            
            const dangerClass = data.danger.includes("极高") ? "danger-high" : 
                               data.danger.includes("高") || data.danger.includes("中高") ? "danger-medium" : "danger-low";
            
            title.textContent = data.name;
            info.innerHTML = `
                <p><strong>主要种族：</strong><span class="race">${data.race}</span></p>
                <p><strong>危险等级：</strong><span class="${dangerClass}">${data.danger}</span></p>
                <p><strong>描述：</strong>${data.description}</p>
                <p><strong>特点：</strong></p>
                <ul>${data.features.map(f => `<li>${f}</li>`).join('')}</ul>
            `;
            
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            popup.classList.add('active');
        }
        
        function closePopup() {
            document.getElementById('popup').classList.remove('active');
        }
        
        // 点击其他地方关闭弹窗
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.region') && 
                !e.target.closest('.marker') && 
                !e.target.closest('.popup')) {
                closePopup();
            }
        });
    </script>
</body>
</html>
